<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Targets | Your Business Coach</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Your Business Coach">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { opacity: 0; transition: opacity 0.2s ease; }
    .page-hero { background: linear-gradient(135deg, #003366 0%, #0D9488 100%); border-radius: 12px; padding: 24px 20px; margin-bottom: 20px; color: white; }
    .page-hero h1 { font-size: 1.4rem; font-weight: 800; margin: 0 0 6px; }
    .page-hero p  { font-size: 0.88rem; opacity: 0.85; margin: 0; line-height: 1.5; }
    .content-card { background: white; border-radius: 10px; border: 2px solid var(--accent); padding: 20px; margin-bottom: 16px; }
    .content-card h2 { font-size: 0.95rem; font-weight: 700; color: var(--primary); margin: 0 0 12px; }
    .content-card label { display: block; font-size: 0.82rem; font-weight: 600; color: #555; margin-bottom: 6px; margin-top: 14px; }
    .content-card label:first-of-type { margin-top: 0; }
    .content-card textarea { width: 100%; min-height: 120px; border: 1px solid #ddd; border-radius: 6px; padding: 10px; font-size: 0.88rem; font-family: inherit; resize: vertical; box-sizing: border-box; color: #333; }
    .content-card textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(13,148,136,0.15); }
    .save-btn { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 12px 24px; font-size: 0.9rem; font-weight: 700; cursor: pointer; width: 100%; margin-top: 4px; transition: background 0.15s; }
    .save-btn:hover { background: var(--accent-dark); }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e5e7eb; display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); box-shadow: 0 -2px 8px rgba(0,0,0,0.06); }
    .bottom-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px 0 6px; text-decoration: none; color: #aaa; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; gap: 3px; transition: color 0.15s; }
    .bottom-nav-item.active, .bottom-nav-item:hover { color: #0D9488; text-decoration: none; }
    .bottom-nav-icon { font-size: 20px; line-height: 1; }
    .container { padding-bottom: 80px; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-left">
        <a href="strategy.html" class="header-back">&#x2190; Strategy</a>
        <span class="header-title">Targets</span>
      </div>
      <button id="signOutBtn" class="sign-out-btn">Sign Out</button>
    </div>
  </header>
  <div class="container">
    <div class="page-hero">
      <h1>Targets</h1>
      <p>The key targets driving your business forward.</p>
    </div>
    <div class="content-card">
      <h2>Key Targets</h2>
      <label for="targets">Define your key targets</label>
      <textarea id="targets" placeholder="What are the specific, measurable targets you are working towards..."></textarea>
    </div>
    <button class="save-btn" id="saveBtn">Save</button>
  </div>
  <nav class="bottom-nav">
    <a class="bottom-nav-item" href="index.html"><span class="bottom-nav-icon">&#x1F3E0;</span><span>Home</span></a>
    <a class="bottom-nav-item active" href="strategy.html"><span class="bottom-nav-icon">&#x1F9ED;</span><span>Strategy</span></a>
    <a class="bottom-nav-item" href="operations.html"><span class="bottom-nav-icon">&#x2699;&#xFE0F;</span><span>Operations</span></a>
  </nav>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient('https://eekefsuaefgpqmjdyniy.supabase.co','sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y');
    const { data: { user }, error } = await supabase.auth.getUser();
    if (!user || error) { window.location.href = 'login.html'; }
    else {
      const { data: profile } = await supabase.from('users').select('membership_status').eq('id', user.id).single();
      if (!profile || profile.membership_status !== 'active') { window.location.href = 'inactive.html'; }
      else {
        document.body.style.opacity = '1';
        document.getElementById('signOutBtn').addEventListener('click', async () => { await supabase.auth.signOut(); window.location.href = 'login.html'; });
        document.getElementById('saveBtn').addEventListener('click', () => { alert('Saved! (persistence coming soon)'); });
      }
    }
  </script>
</body>
</html>

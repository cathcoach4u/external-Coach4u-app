<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Scorecard | Your Business Coach</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body{opacity:0;transition:opacity .2s ease}
    .container{padding-bottom:100px;}
    .ws-header{padding:20px 16px 0}
    .ws-title{font-size:1.15rem;font-weight:800;color:var(--primary);margin:0 0 4px}
    .ws-sub{font-size:.83rem;color:#666;margin:0 0 20px;line-height:1.45}
    .ws-btn{padding:9px 20px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;transition:background .15s}
    .ws-btn:hover{background:var(--accent-dark)}
    .ws-btn-secondary{padding:9px 18px;background:white;color:var(--primary);border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .15s}
    .ws-btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
    .act-card{background:white;border-radius:10px;border:1px solid var(--border);padding:18px 16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
    .page-controls{display:flex;justify-content:space-between;align-items:center;margin:0 16px 24px;flex-wrap:wrap;gap:12px}
    .scorecard-wrap{overflow-x:auto;margin:0 16px 28px;-webkit-overflow-scrolling:touch;border-radius:10px;border:1px solid var(--border);background:white}
    .scorecard-table{width:100%;border-collapse:collapse;font-size:.88rem}
    .scorecard-table th{background:#f0fdfa;font-family:inherit;font-weight:700;color:var(--primary);padding:10px 14px;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap}
    .scorecard-table td{padding:8px 10px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
    .scorecard-table tr:hover td{background:#fafbff}
    .col-metric{min-width:150px;font-family:inherit;font-weight:600;color:var(--primary);position:sticky;left:0;background:white;z-index:1;box-shadow:2px 0 4px -2px rgba(0,0,0,.08)}
    .scorecard-table th.col-metric{background:#f0fdfa;z-index:3}
    .scorecard-table tr:hover td.col-metric{background:#fafbff}
    .col-owner{min-width:90px;color:#666}
    .col-goal{min-width:70px;font-weight:600;color:var(--primary)}
    .col-week{min-width:72px}
    .metric-sub{font-size:.72rem;color:#aaa;font-weight:400;display:block}
    .sc-cell{display:flex;align-items:center;justify-content:center;min-width:60px;height:32px;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:700;font-size:.85rem;transition:opacity .15s;border:1.5px solid transparent}
    @media(max-width:600px){
      .scorecard-wrap{margin:0 8px 24px}
      .scorecard-table{font-size:.8rem}
      .scorecard-table th{padding:8px 10px;font-size:.74rem}
      .scorecard-table td{padding:6px 8px}
      .col-metric{min-width:120px;padding:8px 10px}
      .col-owner{display:none}
      .scorecard-table th.col-owner{display:none}
      .col-goal{min-width:50px}
      .col-week{min-width:56px}
      .sc-cell{min-width:48px;height:28px;font-size:.78rem}
      .metric-edit-btn{font-size:.85rem;padding:2px 4px}
      .metric-sub{font-size:.66rem}
    }
    .sc-cell:hover{opacity:.8}
    .cell-empty{background:#f5f5f5;color:#bbb;border-color:#e0e0e0}
    .cell-green{background:#d1fae5;color:#065f46;border-color:#6ee7b7}
    .cell-red{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
    .metric-edit-btn{background:none;border:none;cursor:pointer;color:var(--accent);font-size:.8rem;padding:2px 6px;border-radius:4px;font-family:inherit;font-weight:600}
    .metric-edit-btn:hover{background:#f0fdfa}
    .cell-popover{position:fixed;z-index:500;background:white;border:1.5px solid var(--accent);border-radius:10px;padding:12px;box-shadow:0 8px 24px rgba(0,0,0,.15);min-width:180px}
    .cell-popover.hidden{display:none}
    .cell-popover input{width:100%;border:1.5px solid var(--border);border-radius:6px;padding:8px 10px;font-family:inherit;font-size:.9rem;box-sizing:border-box;margin-bottom:8px}
    .cell-popover input:focus{outline:none;border-color:var(--accent)}
    .cell-popover-actions{display:flex;gap:6px}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
    .modal-overlay.hidden{display:none}
    .modal{background:white;border-radius:16px;padding:28px;max-width:460px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
    .modal-title{font-family:inherit;font-weight:700;color:var(--primary);font-size:1.15rem}
    .modal-close{background:none;border:none;font-size:1.5rem;cursor:pointer;color:#888;line-height:1;padding:0 4px}
    .modal-field{margin-bottom:16px}
    .modal-label{font-family:inherit;font-weight:600;color:var(--primary);font-size:.88rem;margin-bottom:6px;display:block}
    .modal-input,.modal-select{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;font-family:inherit;font-size:.93rem;color:var(--text);background:white;box-sizing:border-box}
    .modal-input:focus,.modal-select:focus{outline:none;border-color:var(--accent)}
    .modal-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .modal-footer{display:flex;justify-content:space-between;align-items:center;margin-top:24px;gap:10px}
    .modal-footer-right{display:flex;gap:10px}
    .toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-family:inherit;font-weight:600;font-size:.88rem;z-index:2000;transition:opacity .3s;box-shadow:0 4px 12px rgba(0,0,0,.15)}
    .toast-hidden{opacity:0;pointer-events:none}
    .toast-success{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
    .toast-error{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
    .empty-state{text-align:center;padding:48px 20px;color:#888}
    .empty-state-icon{font-size:2.5rem;margin-bottom:12px;opacity:.4}
    .empty-state p{font-family:inherit;font-size:.95rem}
    .hidden{display:none!important}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e5e7eb;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -2px 8px rgba(0,0,0,.06)}
    .bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0 6px;text-decoration:none;color:#aaa;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;gap:3px;transition:color .15s}
    .bottom-nav-item.active,.bottom-nav-item:hover{color:#0D9488;text-decoration:none}
    .bottom-nav-icon{font-size:20px;line-height:1}
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-left">
        <a href="operations.html" class="header-back">&#x2190; Operations</a>
        <span class="header-title">Scorecard</span>
      </div>
      <button class="sign-out-btn" id="sign-out-btn">Sign Out</button>
    </div>
  </header>

  <div class="container">
    <div class="ws-header">
      <h1 class="ws-title">&#x1F4CA; Scorecard</h1>
      <p class="ws-sub">Weekly measurables &#x2014; your company&#x2019;s pulse with leading indicators and targets. Click any cell to enter a value.</p>
    </div>

    <div class="page-controls">
      <span style="font-size:0.78rem;color:#888;">&#x1F7E2; = on track &nbsp; &#x1F534; = off track &nbsp; Click a cell to update</span>
      <button class="ws-btn" id="add-metric-btn">+ Add Metric</button>
    </div>

    <div class="scorecard-wrap">
      <table class="scorecard-table" id="scorecard-table">
        <thead><tr id="scorecard-header-row"></tr></thead>
        <tbody id="scorecard-body"></tbody>
      </table>
    </div>
  </div>

  <div class="cell-popover hidden" id="cell-popover">
    <input type="number" id="cell-input" placeholder="Enter value" step="any"/>
    <div class="cell-popover-actions">
      <button class="ws-btn" id="cell-save" style="padding:7px 14px;font-size:.82rem;">Save</button>
      <button class="ws-btn-secondary" id="cell-cancel" style="padding:7px 12px;font-size:.82rem;">Cancel</button>
    </div>
  </div>

  <div class="modal-overlay hidden" id="metric-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="metric-modal-title">Add Metric</span>
        <button class="modal-close" id="metric-modal-close">&times;</button>
      </div>
      <input type="hidden" id="metric-id"/>
      <div class="modal-field">
        <label class="modal-label">Metric Name *</label>
        <input type="text" class="modal-input" id="metric-name" placeholder="e.g. New Leads, Revenue, Client Calls"/>
      </div>
      <div class="modal-2col">
        <div class="modal-field">
          <label class="modal-label">Owner</label>
          <input type="text" class="modal-input" id="metric-owner" placeholder="Name"/>
        </div>
        <div class="modal-field">
          <label class="modal-label">Weekly Goal</label>
          <input type="number" class="modal-input" id="metric-goal" placeholder="e.g. 10"/>
        </div>
      </div>
      <div class="modal-field">
        <label class="modal-label">Measurement Type</label>
        <select class="modal-select" id="metric-type">
          <option value="number">Number</option>
          <option value="currency">Currency ($)</option>
          <option value="percentage">Percentage (%)</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="ws-btn-secondary hidden" id="metric-modal-delete" style="color:#991b1b;border-color:#fca5a5;">Delete</button>
        <div class="modal-footer-right">
          <button class="ws-btn-secondary" id="metric-modal-cancel">Cancel</button>
          <button class="ws-btn" id="metric-modal-save">Save Metric</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast toast-hidden" id="toast"></div>

  <nav class="bottom-nav">
    <a class="bottom-nav-item" href="index.html"><span class="bottom-nav-icon">&#x1F3E0;</span><span>Home</span></a>
    <a class="bottom-nav-item" href="planning.html"><span class="bottom-nav-icon">&#x1F5FA;&#xFE0F;</span><span>Planning</span></a>
    <a class="bottom-nav-item" href="strategy.html"><span class="bottom-nav-icon">&#x1F9ED;</span><span>Strategy</span></a>
    <a class="bottom-nav-item active" href="operations.html"><span class="bottom-nav-icon">&#x2699;&#xFE0F;</span><span>Operations</span></a>
    <a class="bottom-nav-item" href="learning-vault.html"><span class="bottom-nav-icon">&#x1F4DA;</span><span>Learn</span></a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
  'use strict';
  const _sb=window.supabase.createClient('https://eekefsuaefgpqmjdyniy.supabase.co','sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y');
  document.getElementById('sign-out-btn').addEventListener('click',async()=>{await _sb.auth.signOut();window.location.href='login.html';});
  let currentBusinessId=1,_scorecard={metrics:[],weeks:[]},_activeMeta=null;
  function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
  function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast toast-'+type;t.classList.remove('toast-hidden');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.add('toast-hidden'),3000)}
  // localStorage demo data stub (replaces non-existent /api/... backend). See CLAUDE.md v0.5.50.
  const _LS_KEY='coach4u_demo_scorecard';
  function _genId(){return Date.now()*1000+Math.floor(Math.random()*1000)}
  function _mondayISO(d){const dt=new Date(d);const day=dt.getDay();const diff=(day===0?-6:1)-day;dt.setDate(dt.getDate()+diff);return dt.toISOString().slice(0,10)}
  function _isoAddWeeks(iso,wk){const dt=new Date(iso+'T00:00:00');dt.setDate(dt.getDate()+wk*7);return dt.toISOString().slice(0,10)}
  function _scSeed(){
    const thisMonday=_mondayISO(new Date());
    const weeks=[-5,-4,-3,-2,-1,0].map(o=>_isoAddWeeks(thisMonday,o));
    const metrics=[
      {id:1001,name:'New Leads',owner:'Cath',goal:10,measurement_type:'number',sort_order:1},
      {id:1002,name:'Discovery Calls Booked',owner:'Lou',goal:8,measurement_type:'number',sort_order:2},
      {id:1003,name:'Proposals Sent',owner:'Andrew',goal:5,measurement_type:'number',sort_order:3},
      {id:1004,name:'Revenue (£k)',owner:'Cath',goal:25,measurement_type:'currency',sort_order:4},
      {id:1005,name:'Client NPS',owner:'Lou',goal:9,measurement_type:'number',sort_order:5},
      {id:1006,name:'Marketing Posts',owner:'Andrew',goal:3,measurement_type:'number',sort_order:6}
    ];
    const series={1001:[8,9,11,7,10,12],1002:[6,7,8,9,7,8],1003:[4,6,5,5,6,7],1004:[18,22,24,26,23,28],1005:[8.5,9,9.2,8.8,9.4,9.1],1006:[2,3,4,3,3,5]};
    const entries=[];
    metrics.forEach(m=>weeks.forEach((w,i)=>entries.push({id:_genId()+i,metric_id:m.id,week_date:w,value:series[m.id][i],on_track:series[m.id][i]>=m.goal?1:0})));
    return{metrics,entries,weeks};
  }
  function _scLoad(){let d;try{d=JSON.parse(localStorage.getItem(_LS_KEY))}catch(_){d=null}if(!d||!d.metrics){d=_scSeed();_scSave(d)}return d}
  function _scSave(d){localStorage.setItem(_LS_KEY,JSON.stringify(d))}
  function _scWeeks(d){const m=_mondayISO(new Date());return[-5,-4,-3,-2,-1,0].map(o=>_isoAddWeeks(m,o))}
  async function api(method,path,body){
    await new Promise(r=>setTimeout(r,30));
    const [pathname,query='']=path.split('?');
    const qp={};query.split('&').filter(Boolean).forEach(p=>{const[k,v]=p.split('=');qp[k]=decodeURIComponent(v||'')});
    if(method==='GET'&&pathname==='/businesses')return[{id:1,name:'Demo Business',type:'holding'}];
    const d=_scLoad();
    if(method==='GET'&&pathname==='/scorecard'){
      const weeks=_scWeeks(d);
      const metrics=d.metrics.slice().sort((a,b)=>(a.sort_order||0)-(b.sort_order||0)).map(m=>{
        const entries=weeks.map(w=>{const e=d.entries.find(x=>x.metric_id===m.id&&x.week_date===w);return e?{value:e.value,on_track:e.on_track}:{value:null,on_track:null}});
        return{...m,entries};
      });
      return{metrics,weeks};
    }
    if(method==='POST'&&pathname==='/scorecard/metrics'){
      const m={id:_genId(),name:body.name,owner:body.owner||'',goal:body.goal===''||body.goal==null?null:Number(body.goal),measurement_type:body.measurement_type||'number',sort_order:body.sort_order||(d.metrics.length+1)};
      d.metrics.push(m);_scSave(d);return m;
    }
    if(method==='PUT'&&pathname.startsWith('/scorecard/metrics/')){
      const id=parseInt(pathname.split('/').pop());const m=d.metrics.find(x=>x.id===id);
      if(m){m.name=body.name;m.owner=body.owner||'';m.goal=body.goal===''||body.goal==null?null:Number(body.goal);m.measurement_type=body.measurement_type||'number';_scSave(d)}
      return m||{};
    }
    if(method==='DELETE'&&pathname.startsWith('/scorecard/metrics/')){
      const id=parseInt(pathname.split('/').pop());
      d.metrics=d.metrics.filter(x=>x.id!==id);d.entries=d.entries.filter(e=>e.metric_id!==id);_scSave(d);return{ok:true};
    }
    if(method==='POST'&&pathname==='/scorecard/entries'){
      const mid=Number(body.metric_id),wk=body.week_date;
      const idx=d.entries.findIndex(e=>e.metric_id===mid&&e.week_date===wk);
      if(body.value===null||body.value===undefined){if(idx>-1)d.entries.splice(idx,1);_scSave(d);return{ok:true}}
      if(idx>-1){d.entries[idx].value=body.value;d.entries[idx].on_track=body.on_track}
      else d.entries.push({id:_genId(),metric_id:mid,week_date:wk,value:body.value,on_track:body.on_track});
      _scSave(d);return{ok:true};
    }
    throw new Error('Unhandled api path: '+method+' '+pathname);
  }
  const get=p=>api('GET',p),post=(p,b)=>api('POST',p,b),put=(p,b)=>api('PUT',p,b),del=p=>api('DELETE',p);
  function fmtWeek(d){const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-AU',{day:'numeric',month:'short'})}
  function fmtVal(v,type){if(v===null||v===undefined)return '&#x2014;';if(type==='currency')return '$'+Number(v).toLocaleString();if(type==='percentage')return v+'%';return String(v)}
  async function loadScorecard(){
    try{
      _scorecard=await get('/scorecard?business_id='+currentBusinessId);
      renderTable(_scorecard);
    }catch(e){showToast('Could not load scorecard','error')}
  }
  function renderTable({metrics,weeks}){
    const hRow=document.getElementById('scorecard-header-row');
    const tbody=document.getElementById('scorecard-body');
    hRow.innerHTML=`<th class="col-metric" style="padding:12px 16px;">Metric</th><th class="col-owner">Owner</th><th class="col-goal">Goal</th>${weeks.map(w=>`<th class="col-week" style="text-align:center;">${fmtWeek(w)}</th>`).join('')}<th style="width:40px;"></th>`;
    tbody.innerHTML='';
    if(!metrics.length){tbody.innerHTML=`<tr><td colspan="${weeks.length+4}" style="padding:40px;text-align:center;color:#aaa;font-family:inherit;">No metrics yet &#x2014; add your first measurable above.</td></tr>`;return;}
    metrics.forEach(metric=>{
      const goalNum=parseFloat(metric.goal);
      let goalDisp=metric.goal||'&#x2014;';
      if(metric.measurement_type==='currency')goalDisp='$'+Number(metric.goal||0).toLocaleString();
      else if(metric.measurement_type==='percentage')goalDisp=(metric.goal||0)+'%';
      const tr=document.createElement('tr');
      tr.innerHTML=`<td class="col-metric" style="padding:10px 16px;">${escHtml(metric.name)}<span class="metric-sub">${escHtml(metric.measurement_type)}</span></td><td class="col-owner">${escHtml(metric.owner||'&#x2014;')}</td><td class="col-goal">${goalDisp}</td>${(metric.entries||[]).map((entry,i)=>{const hasVal=entry.value!==null&&entry.value!==undefined;const cls=hasVal?(entry.on_track===1?'cell-green':'cell-red'):'cell-empty';const disp=hasVal?fmtVal(entry.value,metric.measurement_type):'&#x2014;';return `<td style="text-align:center;"><div class="sc-cell ${cls}" data-metric-id="${metric.id}" data-week="${weeks[i]}" data-goal="${goalNum}" data-type="${metric.measurement_type}" data-value="${hasVal?entry.value:''}">${disp}</div></td>`}).join('')}<td><button class="metric-edit-btn" data-metric-id="${metric.id}">&#x270F;</button></td>`;
      tbody.appendChild(tr);
    });
    tbody.querySelectorAll('.sc-cell').forEach(cell=>cell.addEventListener('click',e=>openCellPopover(cell,e)));
    tbody.querySelectorAll('.metric-edit-btn').forEach(btn=>btn.addEventListener('click',()=>{
      const m=_scorecard.metrics.find(x=>x.id===parseInt(btn.dataset.metricId));
      if(m)openMetricModal(m);
    }));
  }
  let _popoverMeta=null;
  function openCellPopover(cell,event){
    _popoverMeta={metricId:parseInt(cell.dataset.metricId),week:cell.dataset.week,goal:parseFloat(cell.dataset.goal),type:cell.dataset.type,cell};
    const input=document.getElementById('cell-input');
    input.value=cell.dataset.value||'';
    const pop=document.getElementById('cell-popover');
    const rect=cell.getBoundingClientRect();
    pop.style.top=(rect.bottom+6+window.scrollY)+'px';
    let left=rect.left+window.scrollX;
    if(left+190>window.innerWidth-10)left=window.innerWidth-200;
    pop.style.left=left+'px';
    pop.classList.remove('hidden');
    input.focus();input.select();
  }
  function closePop(){document.getElementById('cell-popover').classList.add('hidden');_popoverMeta=null}
  document.getElementById('cell-cancel').addEventListener('click',closePop);
  document.getElementById('cell-input').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('cell-save').click();if(e.key==='Escape')closePop()});
  document.addEventListener('click',e=>{const pop=document.getElementById('cell-popover');if(!pop.classList.contains('hidden')&&!pop.contains(e.target)&&!e.target.classList.contains('sc-cell'))closePop()});
  document.getElementById('cell-save').addEventListener('click',async()=>{
    if(!_popoverMeta)return;
    const{metricId,week,goal,type,cell}=_popoverMeta;
    const raw=document.getElementById('cell-input').value.trim();
    if(raw===''){
      try{await post('/scorecard/entries',{metric_id:metricId,week_date:week,value:null,on_track:null,business_id:currentBusinessId});cell.dataset.value='';cell.className='sc-cell cell-empty';cell.innerHTML='&#x2014;';showToast('Cleared','success');closePop()}catch(e){showToast('Failed','error')}
      return;
    }
    const value=parseFloat(raw);
    if(isNaN(value)){showToast('Enter a valid number','error');return}
    const on_track=value>=goal?1:0;
    try{
      await post('/scorecard/entries',{metric_id:metricId,week_date:week,value,on_track,business_id:currentBusinessId});
      cell.dataset.value=value;cell.className='sc-cell '+(on_track?'cell-green':'cell-red');cell.innerHTML=fmtVal(value,type);
      showToast('Saved','success');closePop();
    }catch(e){showToast('Save failed: '+e.message,'error')}
  });
  document.getElementById('add-metric-btn').addEventListener('click',()=>openMetricModal(null));
  function openMetricModal(metric){
    const isNew=!metric;
    document.getElementById('metric-modal-title').textContent=isNew?'Add Metric':'Edit Metric';
    document.getElementById('metric-id').value=isNew?'':metric.id;
    document.getElementById('metric-name').value=isNew?'':(metric.name||'');
    document.getElementById('metric-owner').value=isNew?'':(metric.owner||'');
    document.getElementById('metric-goal').value=isNew?'':(metric.goal||'');
    document.getElementById('metric-type').value=isNew?'number':(metric.measurement_type||'number');
    document.getElementById('metric-modal-delete').classList.toggle('hidden',isNew);
    document.getElementById('metric-modal').classList.remove('hidden');
  }
  function closeMetricModal(){document.getElementById('metric-modal').classList.add('hidden')}
  document.getElementById('metric-modal-close').addEventListener('click',closeMetricModal);
  document.getElementById('metric-modal-cancel').addEventListener('click',closeMetricModal);
  document.getElementById('metric-modal').addEventListener('click',e=>{if(e.target===document.getElementById('metric-modal'))closeMetricModal()});
  document.getElementById('metric-modal-save').addEventListener('click',async()=>{
    const id=document.getElementById('metric-id').value;
    const name=document.getElementById('metric-name').value.trim();
    const owner=document.getElementById('metric-owner').value.trim();
    const goal=document.getElementById('metric-goal').value.trim();
    const measurement_type=document.getElementById('metric-type').value;
    if(!name){showToast('Metric name is required','error');return}
    try{
      if(id){await put('/scorecard/metrics/'+id,{name,owner,goal,measurement_type});showToast('Metric updated','success')}
      else{await post('/scorecard/metrics',{name,owner,goal,measurement_type,sort_order:0,business_id:currentBusinessId});showToast('Metric added','success')}
      closeMetricModal();await loadScorecard();
    }catch(e){showToast('Save failed: '+e.message,'error')}
  });
  document.getElementById('metric-modal-delete').addEventListener('click',async()=>{
    const id=document.getElementById('metric-id').value;
    if(!id||!confirm('Delete this metric and all its data?'))return;
    try{await del('/scorecard/metrics/'+id);showToast('Deleted','success');closeMetricModal();await loadScorecard()}
    catch(e){showToast('Delete failed','error')}
  });
  (async()=>{
    const{data:{user}}=await _sb.auth.getUser();
    if(!user){window.location.href='login.html';return}
    try{
      const businesses=await get('/businesses');
      const biz=businesses.find(b=>b.type==='holding')||businesses[0];
      if(biz)currentBusinessId=biz.id;
      await loadScorecard();
    }catch(e){console.error(e)}
    document.body.style.opacity='1';
  })();
  </script>
</body>
</html>

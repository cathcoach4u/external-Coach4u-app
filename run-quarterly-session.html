<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Run Quarterly Session | Your Business Coach</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body{opacity:0;transition:opacity .2s ease}
    .container{padding-bottom:100px;}
    .ws-header{padding:20px 16px 0}
    .ws-title{font-size:1.15rem;font-weight:800;color:var(--primary);margin:0 0 4px}
    .ws-sub{font-size:.83rem;color:#666;margin:0 0 20px;line-height:1.45}
    .ws-btn{padding:9px 20px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;transition:background .15s}
    .ws-btn:hover{background:var(--accent-dark)}
    .ws-btn-secondary{padding:9px 18px;background:white;color:var(--primary);border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .15s}
    .ws-btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
    .session-detail{background:white;border:1px solid var(--border);border-radius:12px;padding:24px;margin:0 16px 14px}
    .session-empty{text-align:center;padding:48px 20px;color:#aaa;font-family:inherit;background:white;border:1px solid var(--border);border-radius:12px;margin:0 16px}
    .session-detail-heading{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px}
    .session-detail-title{font-family:inherit;font-weight:700;color:var(--primary);font-size:1.15rem}
    .field-select{border:1.5px solid var(--border);border-radius:8px;padding:7px 12px;font-family:inherit;font-size:.85rem;color:var(--primary);background:white;cursor:pointer}
    .session-timer-bar{display:flex;align-items:center;gap:12px;background:#f0fdfa;border-radius:8px;padding:10px 14px;margin-bottom:0}
    .timer-btn{font-family:inherit;font-weight:700;font-size:.85rem;padding:6px 14px;border-radius:6px;cursor:pointer;border:1.5px solid var(--accent);background:white;color:var(--primary);transition:all .15s}
    .timer-btn.running{border-color:#991b1b;color:#991b1b;background:#fff5f5}
    .timer-elapsed{font-family:inherit;font-weight:700;font-size:1rem;color:var(--primary);font-variant-numeric:tabular-nums}
    .toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-family:inherit;font-weight:600;font-size:.88rem;z-index:2000;transition:opacity .3s;box-shadow:0 4px 12px rgba(0,0,0,.15)}
    .toast-hidden{opacity:0;pointer-events:none}
    .toast-success{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
    .toast-error{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
    .hidden{display:none!important}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e5e7eb;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -2px 8px rgba(0,0,0,.06)}
    .bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0 6px;text-decoration:none;color:#aaa;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;gap:3px;transition:color .15s}
    .bottom-nav-item.active,.bottom-nav-item:hover{color:#0D9488;text-decoration:none}
    .bottom-nav-icon{font-size:20px;line-height:1}
    /* Attendance + Areas + Check-in blocks */
    .attendance-block, .areas-block, .checkin-block { background:white; border:1px solid var(--border); border-radius:12px; padding:18px; margin:0 16px 14px; }
    .block-title { font-family:inherit; font-weight:700; color:var(--primary); font-size:1rem; margin:0 0 10px; }
    .attendance-input { width:100%; min-height:60px; border:1.5px solid var(--border); border-radius:8px; padding:10px 12px; font-family:inherit; font-size:.88rem; color:var(--text); resize:vertical; box-sizing:border-box; }
    .attendance-input:focus { outline:none; border-color:var(--accent); }
    .areas-progress { font-size:.8rem; color:#666; margin-bottom:10px; font-family:inherit; font-weight:600; }
    .area-row { display:flex; align-items:flex-start; gap:10px; padding:10px 0; border-bottom:1px solid #f0f0f0; }
    .area-row:last-child { border-bottom:none; }
    .area-row input[type=checkbox] { width:20px; height:20px; flex-shrink:0; margin-top:2px; accent-color:var(--accent); cursor:pointer; }
    .area-text { flex:1; }
    .area-name { font-family:inherit; font-weight:600; color:var(--primary); font-size:.93rem; line-height:1.4; }
    .area-name.complete { text-decoration:line-through; color:#aaa; }
    .area-links { display:flex; gap:14px; flex-wrap:wrap; margin-top:5px; font-size:.82rem; }
    .area-links a { color:var(--accent); font-weight:600; text-decoration:none; }
    .area-links a:hover { text-decoration:underline; }
    .checkin-actions{display:flex;gap:8px;flex-wrap:wrap}
    /* Aggregated check-in results */
    .ci-summary{margin-top:14px;font-size:.85rem;color:#666;font-family:inherit;font-weight:600}
    .ci-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem;font-family:inherit}
    .ci-table th,.ci-table td{padding:8px 10px;border-bottom:1px solid #f0f0f0;text-align:left;vertical-align:middle}
    .ci-table th{font-weight:700;color:var(--primary);background:#f0fdfa;font-size:.78rem;text-transform:uppercase;letter-spacing:.04em}
    .ci-table td.ci-avg{font-weight:700;text-align:center;white-space:nowrap}
    .ci-table td.ci-dot-cell{width:24px;text-align:center}
    .ci-dot{display:inline-block;width:10px;height:10px;border-radius:50%}
    .ci-dot-red{background:#dc2626}
    .ci-dot-amber{background:#d97706}
    .ci-dot-green{background:#059669}
    .ci-comments-toggle{margin-top:12px;background:none;border:none;color:var(--accent);font-family:inherit;font-weight:600;cursor:pointer;padding:6px 0;font-size:.85rem}
    .ci-comments-toggle:hover{text-decoration:underline}
    .ci-comments{margin-top:10px}
    .ci-comments-q{margin-bottom:14px}
    .ci-comments-q-title{font-family:inherit;font-weight:700;color:var(--primary);font-size:.85rem;margin-bottom:5px}
    .ci-comments-c{font-family:inherit;font-size:.83rem;color:var(--text);padding:6px 10px;background:#fafbfc;border-left:3px solid var(--accent);border-radius:4px;margin-bottom:5px}
    .ci-comments-author{font-weight:700;color:var(--primary)}
  </style>
  <script src="js/active-session.js" defer></script>
  <script src="js/active-org.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-left">
        <a href="quarterly-sessions.html" class="header-back">&#x2190; Quarterly Sessions</a>
        <span class="header-title">Run Quarterly Session</span>
        <span id="activeBizName" class="biz-pill"></span>
      </div>
      <button class="sign-out-btn" id="signOutBtn">Sign Out</button>
    </div>
  </header>

  <div class="container">
    <div class="ws-header">
      <h1 class="ws-title" id="ws-title">&#x1F3AF; Quarterly Planning Session</h1>
      <p class="ws-sub" id="ws-sub">Track attendance, tick off each area as you cover it, and share the team check-in link.</p>
    </div>

    <div class="session-detail session-empty hidden" id="session-empty">
      No session selected. <a href="quarterly-sessions.html" style="color:var(--accent);font-weight:600;">Back to Quarterly Sessions &#x2192;</a>
    </div>
    <div id="session-content"></div>
  </div>

  <div class="toast toast-hidden" id="toast"></div>

  <nav class="bottom-nav">
    <a class="bottom-nav-item" href="business.html"><span class="bottom-nav-icon">&#x1F3E0;</span><span>Home</span></a>
    <a class="bottom-nav-item active" href="planning.html"><span class="bottom-nav-icon">&#x1F5FA;&#xFE0F;</span><span>Planning</span></a>
    <a class="bottom-nav-item" href="strategy.html"><span class="bottom-nav-icon">&#x1F9ED;</span><span>Strategy</span></a>
    <a class="bottom-nav-item" href="operations.html"><span class="bottom-nav-icon">&#x2699;&#xFE0F;</span><span>Operations</span></a>
    <a class="bottom-nav-item" href="learning-vault.html"><span class="bottom-nav-icon">&#x1F4DA;</span><span>Learn</span></a>
  </nav>

  <script type="module">
  'use strict';
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
  const _sb=createClient('https://eekefsuaefgpqmjdyniy.supabase.co','sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y');
  document.getElementById('signOutBtn').addEventListener('click',async()=>{await _sb.auth.signOut();window.location.href='login.html';});
  let orgId=null,_currentSession=null,_timerInterval=null,_timerStart=null,_attendanceTimer=null;
  function escHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
  function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast toast-'+type;t.classList.remove('toast-hidden');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.add('toast-hidden'),3000)}

  /* Previous localStorage SEED for coach4u_quarterly_sessions retained for reference only —
     no longer applied. Sessions are read from Supabase `quarterly_sessions` keyed by
     organisation_id + uuid id. */

  function fmtDate(d){if(!d)return '';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}
  function getSessionId(){const u=new URLSearchParams(window.location.search);const id=u.get('id');return id||null}

  async function fetchSession(id){
    const { data, error } = await _sb
      .from('quarterly_sessions')
      .select('*')
      .eq('id', id)
      .maybeSingle();
    if(error){ console.warn('Load session failed:', error.message); return null; }
    return data || null;
  }
  async function updateSession(id, patch){
    const { error } = await _sb
      .from('quarterly_sessions')
      .update(patch)
      .eq('id', id);
    if(error){ console.warn('Update session failed:', error.message); throw error; }
  }

  // 17 team check-in questions (must stay in sync with team-checkin.html)
  const CHECKIN_QUESTIONS = [
    "We have a clear vision in writing that has been properly communicated and is shared by all.",
    "Our Core Focus (core business) is clear, and we keep our people, systems, and processes aligned with it.",
    "Our 10-Year Target (big, long-range business goal) is clear, communicated regularly, and is shared by all.",
    "Our 3-Year Target is clear, communicated regularly, and is shared by all.",
    "Our Accountability Chart (organisational chart that includes roles/responsibilities) is clear, complete, and constantly updated.",
    "Everyone is in the \"right seat\" (they get it, want it, and have the capacity to do their job well).",
    "Our leadership team is open and honest, and demonstrates a high level of trust.",
    "All teams clearly identify, discuss, and solve issues for the long-term greater good of the business.",
    "Everyone is engaged in regular weekly meetings.",
    "Everyone has Quarterly Projects (1 to 7 priorities per quarter) and is focused on them.",
    "All meetings are on the same day and at the same time each week, have the same agenda, and start and end on time.",
    "We conduct Annual Meetings to discuss the focus for the upcoming year.",
    "Our core values are clear, and we are hiring, reviewing, rewarding, and firing around them.",
    "All of the people in our organisation are the \"right people\" (they fit our culture and share our values).",
    "We have a focus on mentoring and coaching our team members.",
    "We have a focus on a Strengths-Based Culture.",
    "We are committed to creating a workplace culture where everyone can thrive in all aspects."
  ];

  function buildCheckinLink(sessionId){
    return new URL('team-checkin.html?session='+sessionId+'&type=quarterly', window.location.href).href;
  }

  async function loadCheckins(sessionId, sessionType){
    const { data, error } = await _sb
      .from('team_checkins')
      .select('*')
      .eq('session_id', sessionId)
      .eq('session_type', sessionType);
    if(error){ console.warn('Load team_checkins failed:', error.message); return []; }
    return Array.isArray(data) ? data : [];
  }

  function aggregate(checkins, questionCount=17){
    const rows=[];
    for(let i=0;i<questionCount;i++){
      const scores=checkins.map(c=>{const v=(c.scores||[])[i];const n=Number(v);return isNaN(n)?null:n;}).filter(v=>v!==null);
      const sum=scores.reduce((a,b)=>a+b,0);
      const avg=scores.length?sum/scores.length:null;
      rows.push({q:i, text:CHECKIN_QUESTIONS[i]||('Question '+(i+1)), avg, count:scores.length});
    }
    return rows;
  }

  function dotClass(avg){
    if(avg==null) return 'ci-dot ci-dot-amber';
    if(avg<3) return 'ci-dot ci-dot-red';
    if(avg<4) return 'ci-dot ci-dot-amber';
    return 'ci-dot ci-dot-green';
  }

  function truncate(s, max){ s=String(s||''); return s.length>max ? s.slice(0,max-1)+'…' : s; }

  async function renderCheckinResults(container, sessionId, sessionType){
    if(!container) return;
    const checkins=await loadCheckins(sessionId, sessionType);
    const n=checkins.length;
    if(n===0){
      container.innerHTML='<div class="ci-summary">No responses yet</div>';
      return;
    }
    const rows=aggregate(checkins, CHECKIN_QUESTIONS.length).slice().sort((a,b)=>{
      const av=(a.avg==null?Infinity:a.avg), bv=(b.avg==null?Infinity:b.avg);
      return av-bv;
    });
    let html='<div class="ci-summary">'+n+' team response'+(n===1?'':'s')+' received</div>';
    html+='<table class="ci-table"><thead><tr><th></th><th>Question</th><th style="text-align:center;">Avg</th></tr></thead><tbody>';
    rows.forEach(r=>{
      html+='<tr><td class="ci-dot-cell"><span class="'+dotClass(r.avg)+'"></span></td>'
          +'<td>'+escHtml(truncate(r.text,80))+'</td>'
          +'<td class="ci-avg">'+(r.avg==null?'—':r.avg.toFixed(1))+'</td></tr>';
    });
    html+='</tbody></table>';
    html+='<button class="ci-comments-toggle" id="ci-comments-toggle">Show individual comments &#x25BC;</button>';
    html+='<div class="ci-comments hidden" id="ci-comments"></div>';
    container.innerHTML=html;

    const toggle=container.querySelector('#ci-comments-toggle');
    const wrap=container.querySelector('#ci-comments');
    if(toggle && wrap){
      let built=false;
      toggle.addEventListener('click',()=>{
        if(!built){
          let inner='';
          for(let i=0;i<CHECKIN_QUESTIONS.length;i++){
            const qComments=checkins.map(c=>({author:c.name||'Anon', text:(c.comments||[])[i]||''})).filter(x=>x.text && x.text.trim());
            if(!qComments.length) continue;
            inner+='<div class="ci-comments-q"><div class="ci-comments-q-title">'+escHtml(CHECKIN_QUESTIONS[i])+'</div>';
            qComments.forEach(c=>{
              inner+='<div class="ci-comments-c"><span class="ci-comments-author">'+escHtml(c.author)+':</span> '+escHtml(c.text)+'</div>';
            });
            inner+='</div>';
          }
          if(!inner) inner='<div class="ci-summary" style="margin-top:0;">No written comments submitted yet.</div>';
          wrap.innerHTML=inner;
          built=true;
        }
        const isHidden=wrap.classList.toggle('hidden');
        toggle.innerHTML=(isHidden?'Show':'Hide')+' individual comments '+(isHidden?'&#x25BC;':'&#x25B2;');
      });
    }
  }

  // Areas to cover during the quarterly session
  const AREAS=[
    {id:1, name:'Review Last Quarter',         links:[{href:'goals.html',text:'Open Quarterly Goals →'}]},
    {id:2, name:'Lessons + Adjustments',       links:[]},
    {id:3, name:"Set Next Quarter's Goals",    links:[{href:'goals.html',text:'Open Quarterly Goals →'}]}
  ];

  async function loadDetail(id){
    const s=await fetchSession(id);
    if(!s){
      document.getElementById('session-empty').classList.remove('hidden');
      document.getElementById('session-empty').innerHTML='Session not found. <a href="quarterly-sessions.html" style="color:var(--accent);font-weight:600;">Back to Quarterly Sessions &#x2192;</a>';
      return;
    }
    _currentSession=s;
    const qn=(/^Q(\d)/.exec(s.target_quarter||'')||[])[1]||'';
    document.getElementById('ws-title').innerHTML='&#x1F3AF; '+(qn?'Q'+qn:'Quarterly')+' Planning Session — '+fmtDate(s.session_date);
    document.getElementById('ws-sub').textContent='Sets goals for '+(s.target_quarter||'next quarter')+' — track attendance, tick off each area as you cover it, and share the team check-in link.';
    await renderDetail(s);
  }

  function progressText(areasCompleted){
    const total=AREAS.length;
    const done=AREAS.filter(a=>areasCompleted&&areasCompleted[a.id]).length;
    return done+' of '+total+' areas completed';
  }

  async function renderDetail(s){
    const c=document.getElementById('session-content');
    if(_timerInterval){clearInterval(_timerInterval);_timerInterval=null;_timerStart=null;}
    const attendance=s.attendance||'';
    const areasCompleted=s.areas_completed||{};
    const checkinLink=buildCheckinLink(s.id);
    c.innerHTML=`
      <div class="session-detail">
        <div class="session-detail-heading">
          <div><div class="session-detail-title">&#x1F3AF; ${fmtDate(s.session_date)} &middot; Sets ${escHtml(s.target_quarter||'')}</div></div>
          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
            <select class="field-select" id="session-status">
              <option value="scheduled" ${s.status==='scheduled'?'selected':''}>Scheduled</option>
              <option value="in_progress" ${s.status==='in_progress'?'selected':''}>In Progress</option>
              <option value="completed" ${s.status==='completed'?'selected':''}>Completed</option>
            </select>
          </div>
        </div>
        <div class="session-timer-bar">
          <button class="timer-btn" id="timer-btn">▶ Start Session</button>
          <span class="timer-elapsed hidden" id="timer-elapsed">0:00</span>
          <span style="font-size:.8rem;color:#888;font-family:inherit;">Target: half day</span>
        </div>
      </div>

      <div class="attendance-block">
        <h3 class="block-title">&#x1F4CB; Attendance</h3>
        <textarea class="attendance-input" id="attendance-input" placeholder="Who is in this session?">${escHtml(attendance)}</textarea>
      </div>

      <div class="areas-block">
        <h3 class="block-title">&#x2705; Areas to Cover</h3>
        <p class="areas-progress" id="areas-progress">${progressText(areasCompleted)}</p>
        ${AREAS.map(area=>{
          const checked=!!areasCompleted[area.id];
          const linksHtml=area.links.length?`<div class="area-links">${area.links.map(l=>`<a href="${l.href}">${l.text}</a>`).join('')}</div>`:'';
          return `
            <div class="area-row">
              <input type="checkbox" data-area-id="${area.id}" id="area-${area.id}" ${checked?'checked':''}>
              <div class="area-text">
                <label class="area-name ${checked?'complete':''}" for="area-${area.id}" data-area-id="${area.id}">${escHtml(area.name)}</label>
                ${linksHtml}
              </div>
            </div>
          `;
        }).join('')}
      </div>

      <div class="checkin-block">
        <h3 class="block-title">&#x1F31F; Team Check-in</h3>
        <div class="checkin-actions">
          <button class="ws-btn" id="copy-checkin-link">Copy Check-in Link</button>
          <a class="ws-btn-secondary" href="${escHtml(checkinLink)}" target="_blank" rel="noopener" style="display:inline-block;text-decoration:none;">Open Form</a>
        </div>
        <div id="ci-results"></div>
      </div>
    `;

    await renderCheckinResults(c.querySelector('#ci-results'), s.id, 'quarterly');

    // Attendance auto-save (debounced ~300ms)
    const attInput=c.querySelector('#attendance-input');
    attInput.addEventListener('input',()=>{
      clearTimeout(_attendanceTimer);
      _attendanceTimer=setTimeout(async()=>{
        const val=attInput.value;
        _currentSession.attendance=val;
        try{ await updateSession(s.id,{attendance:val}); }
        catch(err){ showToast('Save failed','error'); }
      },300);
    });

    // Area checkboxes — immediate save
    c.querySelectorAll('input[type=checkbox][data-area-id]').forEach(cb=>{
      cb.addEventListener('change', async ()=>{
        const aid=parseInt(cb.dataset.areaId);
        const next=Object.assign({},_currentSession.areas_completed||{});
        next[aid]=cb.checked;
        const prev=_currentSession.areas_completed;
        _currentSession.areas_completed=next;
        const label=c.querySelector('label[data-area-id="'+aid+'"]');
        if(label) label.classList.toggle('complete',cb.checked);
        const prog=c.querySelector('#areas-progress');
        if(prog) prog.textContent=progressText(next);
        try{ await updateSession(s.id,{areas_completed:next}); }
        catch(err){
          showToast('Save failed','error');
          _currentSession.areas_completed=prev||{};
          cb.checked=!cb.checked;
          if(label) label.classList.toggle('complete',cb.checked);
          if(prog) prog.textContent=progressText(_currentSession.areas_completed);
        }
      });
    });

    // Copy check-in link
    const copyBtn=c.querySelector('#copy-checkin-link');
    if(copyBtn){
      copyBtn.addEventListener('click',()=>{
        const link=buildCheckinLink(s.id);
        if(navigator.clipboard && navigator.clipboard.writeText){
          navigator.clipboard.writeText(link).then(()=>showToast('Link copied — share it with your team','success'),()=>showToast('Copy failed — '+link,'error'));
        } else {
          try{const ta=document.createElement('textarea');ta.value=link;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('Link copied — share it with your team','success');}
          catch(_){showToast('Copy failed — '+link,'error');}
        }
      });
    }

    // Status dropdown
    c.querySelector('#session-status').addEventListener('change', async e=>{
      const newStatus=e.target.value;
      _currentSession.status=newStatus;
      try{
        await updateSession(s.id,{status:newStatus});
        showToast('Status updated','success');
        if(window.activeSession){
          if(newStatus==='in_progress') window.activeSession.set('quarterly',s.id,(s.target_quarter||'Quarterly')+' Session');
          else if(newStatus==='completed') window.activeSession.clear();
        }
      }
      catch(err){showToast('Update failed','error')}
    });

    // Timer
    const timerBtn=c.querySelector('#timer-btn'),timerEl=c.querySelector('#timer-elapsed');
    timerBtn.addEventListener('click', async ()=>{
      if(!_timerStart){
        _timerStart=Date.now();timerEl.classList.remove('hidden');timerBtn.textContent='⏹ End Session';timerBtn.classList.add('running');
        _timerInterval=setInterval(()=>{const sec=Math.floor((Date.now()-_timerStart)/1000);const mm=Math.floor(sec/60),ss=sec%60;timerEl.textContent=mm+':'+(ss<10?'0':'')+ss;},1000);
        c.querySelector('#session-status').value='in_progress';_currentSession.status='in_progress';
        try{ await updateSession(s.id,{status:'in_progress'}); }catch(_){}
        if(window.activeSession) window.activeSession.set('quarterly',s.id,(s.target_quarter||'Quarterly')+' Session');
      }else{
        clearInterval(_timerInterval);_timerInterval=null;_timerStart=null;
        timerEl.classList.add('hidden');timerBtn.textContent='▶ Start Session';timerBtn.classList.remove('running');
        c.querySelector('#session-status').value='completed';_currentSession.status='completed';
        try{ await updateSession(s.id,{status:'completed'}); }catch(_){}
        if(window.activeSession) window.activeSession.clear();
      }
    });
  }

  (async()=>{
    const{data:{user}}=await _sb.auth.getUser();
    if(!user){window.location.href='login.html';return}
    const { data: profile } = await _sb
      .from('users').select('membership_status').eq('id', user.id).single();
    if (!profile || profile.membership_status !== 'active') {
      window.location.href = 'inactive.html'; return;
    }
    orgId = window.activeOrg && window.activeOrg.get();
    if(!orgId){ window.location.href='index.html'; return; }
    const id=getSessionId();
    if(!id){
      window.location.href='quarterly-sessions.html';
      return;
    }
    try { await loadDetail(id); } catch(e){ console.warn('Load detail error:', e); }
    document.body.style.opacity='1';
  })();
  </script>
</body>
</html>

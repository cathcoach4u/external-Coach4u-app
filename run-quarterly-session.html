<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Run Quarterly Session | Your Business Coach</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body{opacity:0;transition:opacity .2s ease}
    .container{padding-bottom:100px;}
    .ws-header{padding:20px 16px 0}
    .ws-title{font-size:1.15rem;font-weight:800;color:var(--primary);margin:0 0 4px}
    .ws-sub{font-size:.83rem;color:#666;margin:0 0 20px;line-height:1.45}
    .ws-btn{padding:9px 20px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;transition:background .15s}
    .ws-btn:hover{background:var(--accent-dark)}
    .ws-btn-secondary{padding:9px 18px;background:white;color:var(--primary);border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .15s}
    .ws-btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
    .session-detail{background:white;border:1px solid var(--border);border-radius:12px;padding:24px;margin:0 16px}
    .session-empty{text-align:center;padding:48px 20px;color:#aaa;font-family:inherit;background:white;border:1px solid var(--border);border-radius:12px;margin:0 16px}
    .session-detail-heading{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px}
    .session-detail-title{font-family:inherit;font-weight:700;color:var(--primary);font-size:1.15rem}
    .field-select{border:1.5px solid var(--border);border-radius:8px;padding:7px 12px;font-family:inherit;font-size:.85rem;color:var(--primary);background:white;cursor:pointer}
    .status-pill{font-size:.7rem;font-weight:700;padding:2px 7px;border-radius:20px}
    .sp-scheduled{background:#fef3c7;color:#92400e}
    .sp-in_progress{background:#dbeafe;color:#1e40af}
    .sp-completed{background:#d1fae5;color:#065f46}
    .agenda-section{border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden}
    .agenda-toggle{width:100%;display:flex;align-items:center;gap:12px;padding:14px 16px;background:#f0fdfa;border:none;cursor:pointer;text-align:left;transition:background .12s}
    .agenda-toggle:hover{background:#eef2fa}
    .agenda-num{width:26px;height:26px;border-radius:50%;background:var(--primary);color:white;display:grid;place-items:center;font-family:inherit;font-weight:700;font-size:.82rem;flex-shrink:0}
    .agenda-title-text{font-family:inherit;font-weight:700;color:var(--primary);font-size:.93rem;flex:1}
    .agenda-arrow{margin-left:8px;font-size:.8rem;color:#aaa;transition:transform .2s}
    .agenda-toggle.open .agenda-arrow{transform:rotate(180deg)}
    .agenda-content{display:none;padding:16px}
    .agenda-content.open{display:block}
    .agenda-prompt{font-size:.88rem;color:#666;font-family:inherit;line-height:1.5;margin:0 0 10px}
    .agenda-links{margin:0 0 12px;font-size:.85rem;font-family:inherit}
    .agenda-links a{color:var(--accent);font-weight:600;text-decoration:none;margin-right:14px}
    .agenda-links a:hover{text-decoration:underline}
    .session-timer-bar{display:flex;align-items:center;gap:12px;background:#f0fdfa;border-radius:8px;padding:10px 14px;margin-bottom:16px}
    .timer-btn{font-family:inherit;font-weight:700;font-size:.85rem;padding:6px 14px;border-radius:6px;cursor:pointer;border:1.5px solid var(--accent);background:white;color:var(--primary);transition:all .15s}
    .timer-btn.running{border-color:#991b1b;color:#991b1b;background:#fff5f5}
    .timer-elapsed{font-family:inherit;font-weight:700;font-size:1rem;color:var(--primary);font-variant-numeric:tabular-nums}
    .rating-btns{display:flex;gap:8px;flex-wrap:wrap}
    .rating-btn{width:40px;height:40px;border-radius:8px;border:2px solid var(--border);background:white;cursor:pointer;font-family:inherit;font-weight:700;font-size:.9rem;transition:all .15s}
    .rating-btn.selected{background:var(--primary);color:white;border-color:var(--primary)}
    .notes-textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;font-family:inherit;font-size:.88rem;resize:vertical;min-height:90px;box-sizing:border-box}
    .notes-textarea:focus{outline:none;border-color:var(--accent)}
    .toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-family:inherit;font-weight:600;font-size:.88rem;z-index:2000;transition:opacity .3s;box-shadow:0 4px 12px rgba(0,0,0,.15)}
    .toast-hidden{opacity:0;pointer-events:none}
    .toast-success{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
    .toast-error{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
    .hidden{display:none!important}
    .label-sm{font-family:inherit;font-weight:600;color:var(--primary);font-size:.85rem;margin-bottom:8px;display:block}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e5e7eb;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -2px 8px rgba(0,0,0,.06)}
    .bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0 6px;text-decoration:none;color:#aaa;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;gap:3px;transition:color .15s}
    .bottom-nav-item.active,.bottom-nav-item:hover{color:#0D9488;text-decoration:none}
    .bottom-nav-icon{font-size:20px;line-height:1}
    /* Team Check-in section */
    .checkin-block{background:white;border:1px solid var(--border);border-radius:12px;padding:18px;margin:0 16px 14px}
    .checkin-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:10px}
    .checkin-title{font-family:inherit;font-weight:700;color:var(--primary);font-size:1rem;margin:0}
    .checkin-count{font-family:inherit;color:#666;font-size:.82rem;margin:2px 0 0}
    .checkin-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    .checkin-empty{font-family:inherit;color:#888;font-size:.83rem;font-style:italic;margin:4px 0 0}
    .ci-table{width:100%;border-collapse:collapse;font-family:inherit;font-size:.83rem;margin-top:6px}
    .ci-table th{text-align:left;color:#888;font-weight:600;font-size:.72rem;letter-spacing:.5px;text-transform:uppercase;padding:6px 8px;border-bottom:1px solid var(--border)}
    .ci-table td{padding:8px;border-bottom:1px solid #f0f0f0;vertical-align:middle;color:var(--text)}
    .ci-table .ci-avg{font-weight:700;color:var(--primary);font-variant-numeric:tabular-nums;text-align:right;width:54px}
    .ci-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}
    .ci-dot-red{background:#dc2626}
    .ci-dot-amber{background:#f59e0b}
    .ci-dot-green{background:#10b981}
    .ci-comments{margin-top:6px}
    .ci-comments .ci-q{font-family:inherit;font-weight:700;color:var(--primary);font-size:.85rem;margin:14px 0 4px}
    .ci-comments .ci-c{font-family:inherit;color:#444;font-size:.83rem;background:#f8fafc;border-left:3px solid var(--accent);padding:6px 10px;border-radius:4px;margin:4px 0;line-height:1.45}
    .ci-comments .ci-c .ci-author{color:#888;font-size:.75rem;font-weight:600;margin-right:6px}
  </style>
  <script src="js/active-session.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-left">
        <a href="quarterly-sessions.html" class="header-back">&#x2190; Quarterly Sessions</a>
        <span class="header-title">Run Quarterly Session</span>
      </div>
      <button class="sign-out-btn" id="signOutBtn">Sign Out</button>
    </div>
  </header>

  <div class="container">
    <div class="ws-header">
      <h1 class="ws-title" id="ws-title">&#x1F3AF; Quarterly Planning Session</h1>
      <p class="ws-sub" id="ws-sub">Review the last quarter, set the next.</p>
    </div>

    <div class="session-detail session-empty hidden" id="session-empty">
      No session selected. <a href="quarterly-sessions.html" style="color:var(--accent);font-weight:600;">Back to Quarterly Sessions &#x2192;</a>
    </div>
    <div id="session-content"></div>
  </div>

  <div class="toast toast-hidden" id="toast"></div>

  <nav class="bottom-nav">
    <a class="bottom-nav-item" href="index.html"><span class="bottom-nav-icon">&#x1F3E0;</span><span>Home</span></a>
    <a class="bottom-nav-item active" href="planning.html"><span class="bottom-nav-icon">&#x1F5FA;&#xFE0F;</span><span>Planning</span></a>
    <a class="bottom-nav-item" href="strategy.html"><span class="bottom-nav-icon">&#x1F9ED;</span><span>Strategy</span></a>
    <a class="bottom-nav-item" href="operations.html"><span class="bottom-nav-icon">&#x2699;&#xFE0F;</span><span>Operations</span></a>
    <a class="bottom-nav-item" href="learning-vault.html"><span class="bottom-nav-icon">&#x1F4DA;</span><span>Learn</span></a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
  'use strict';
  const _sb=window.supabase.createClient('https://eekefsuaefgpqmjdyniy.supabase.co','sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y');
  document.getElementById('signOutBtn').addEventListener('click',async()=>{await _sb.auth.signOut();window.location.href='login.html';});
  let _currentSession=null,_timerInterval=null,_timerStart=null;
  function escHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
  function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast toast-'+type;t.classList.remove('toast-hidden');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.add('toast-hidden'),3000)}
  const _LS_KEY='coach4u_quarterly_sessions';
  function _quarterlyAgendaBlank(){
    return [
      { id:1, title:'Review Last Quarter',          notes:'' },
      { id:2, title:'Lessons + Adjustments',        notes:'' },
      { id:3, title:"Set Next Quarter's Goals",     notes:'' },
      { id:4, title:'Conclude — Rate the Session',  notes:'' }
    ];
  }
  function quarterEndDate(qLabel){
    const m=/^Q(\d)\s+(\d{4})$/.exec(qLabel); if(!m) return new Date().toISOString().slice(0,10);
    const q=parseInt(m[1]); const yr=parseInt(m[2]);
    let priorQ=q-1, priorYr=yr; if(priorQ<1){priorQ=4;priorYr=yr-1;}
    const endMonth=[3,6,9,12][priorQ-1];
    const endDay=[31,30,30,31][priorQ-1];
    return priorYr+'-'+String(endMonth).padStart(2,'0')+'-'+String(endDay).padStart(2,'0');
  }
  function priorQuarter(qLabel){
    const m=/^Q(\d)\s+(\d{4})$/.exec(qLabel); if(!m) return '';
    const q=parseInt(m[1]); const yr=parseInt(m[2]);
    let pq=q-1, py=yr; if(pq<1){pq=4;py=yr-1;}
    return 'Q'+pq+' '+py;
  }
  function nextUpcomingQuarter(){
    const now=new Date();
    const yr=now.getFullYear();
    const currentQ=Math.floor(now.getMonth()/3)+1;
    let nextQ=currentQ+1, nextYr=yr; if(nextQ>4){nextQ=1;nextYr=yr+1;}
    return 'Q'+nextQ+' '+nextYr;
  }
  function _quarterlySeed(){
    return [
      { id:6001, session_date:'2026-03-31', target_quarter:'Q2 2026', status:'completed', rating:7,
        agenda:[
          { id:1, title:'Review Last Quarter',          notes:'Q1 results: 4 of 5 priorities hit. Missed associate-coach hire (still searching). Revenue $98k (target $90k) — strong.' },
          { id:2, title:'Lessons + Adjustments',        notes:'Need a clearer rock owner for hiring. Sales pipeline review should be weekly not monthly.' },
          { id:3, title:"Set Next Quarter's Goals",     notes:'Q2: 1) Hire associate coach (Lou), 2) Launch group coaching program, 3) 5 new clients, 4) Speak at 2 events.' },
          { id:4, title:'Conclude — Rate the Session',  notes:'Solid session. Cath to update goals.html with Q2 priorities by EOW.' }
        ]
      },
      { id:6002, session_date:'2026-06-30', target_quarter:'Q3 2026', status:'completed', rating:8,
        agenda:[
          { id:1, title:'Review Last Quarter',          notes:'Q2: 3 of 4 priorities hit. Hired associate coach (Sarah, started May). Group program launched with 6 participants. Missed event speaking target (1 of 2).' },
          { id:2, title:'Lessons + Adjustments',        notes:'Event scheduling needs more lead time. Group program proves out — repeat in Q3 with 10 participants.' },
          { id:3, title:"Set Next Quarter's Goals",     notes:'Q3: 1) Group cohort #2 (10 ppl), 2) Sign 6 new 1:1 clients, 3) Publish signature workbook, 4) Hire admin support.' },
          { id:4, title:'Conclude — Rate the Session',  notes:'Best session yet. Team in sync. Andrew to brief team Monday.' }
        ]
      },
      { id:6003, session_date:quarterEndDate(nextUpcomingQuarter()), target_quarter:nextUpcomingQuarter(), status:'scheduled', rating:null,
        agenda:_quarterlyAgendaBlank()
      }
    ];
  }
  function _quarterlyLoad(){let d;try{d=JSON.parse(localStorage.getItem(_LS_KEY))}catch(_){d=null}if(!Array.isArray(d)||d.length===0){d=_quarterlySeed();_quarterlySave(d)}return d}
  function _quarterlySave(d){localStorage.setItem(_LS_KEY,JSON.stringify(d))}
  function fmtDate(d){if(!d)return '';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}
  function getSessionId(){const u=new URLSearchParams(window.location.search);const id=parseInt(u.get('id'));return isNaN(id)?null:id}
  function getSession(id){const all=_quarterlyLoad();return all.find(s=>s.id===id)||null}
  function updateSession(id,patch){const all=_quarterlyLoad();const s=all.find(x=>x.id===id);if(s){Object.assign(s,patch);_quarterlySave(all)}return s}
  function updateAgendaNotes(id,agendaId,notes){const all=_quarterlyLoad();const s=all.find(x=>x.id===id);if(s){const a=(s.agenda||[]).find(x=>x.id===agendaId);if(a){a.notes=notes;_quarterlySave(all)}}return s}

  // 17 team check-in questions (must stay in sync with team-checkin.html)
  const CHECKIN_QUESTIONS = [
    "We have a clear vision in writing that has been properly communicated and is shared by all.",
    "Our Core Focus (core business) is clear, and we keep our people, systems, and processes aligned with it.",
    "Our 10-Year Target (big, long-range business goal) is clear, communicated regularly, and is shared by all.",
    "Our 3-Year Target is clear, communicated regularly, and is shared by all.",
    "Our Accountability Chart (organisational chart that includes roles/responsibilities) is clear, complete, and constantly updated.",
    "Everyone is in the \"right seat\" (they get it, want it, and have the capacity to do their job well).",
    "Our leadership team is open and honest, and demonstrates a high level of trust.",
    "All teams clearly identify, discuss, and solve issues for the long-term greater good of the business.",
    "Everyone is engaged in regular weekly meetings.",
    "Everyone has Quarterly Projects (1 to 7 priorities per quarter) and is focused on them.",
    "All meetings are on the same day and at the same time each week, have the same agenda, and start and end on time.",
    "We conduct Annual Meetings to discuss the focus for the upcoming year.",
    "Our core values are clear, and we are hiring, reviewing, rewarding, and firing around them.",
    "All of the people in our organisation are the \"right people\" (they fit our culture and share our values).",
    "We have a focus on mentoring and coaching our team members.",
    "We have a focus on a Strengths-Based Culture.",
    "We are committed to creating a workplace culture where everyone can thrive in all aspects."
  ];

  function loadCheckins(sessionId, sessionType){
    try {
      const all = JSON.parse(localStorage.getItem('coach4u_team_checkins') || '[]');
      return all.filter(c => c.session_id === sessionId && c.session_type === sessionType);
    } catch (_) { return []; }
  }
  function aggregate(checkins, questionCount){
    if (!checkins.length) return [];
    const out = [];
    for (let q = 0; q < questionCount; q++) {
      const scores = checkins.map(c => (c.scores || [])[q]).filter(v => typeof v === 'number');
      const avg = scores.length ? scores.reduce((a,b) => a+b, 0) / scores.length : null;
      out.push({ q, avg, count: scores.length });
    }
    return out;
  }
  function avgClass(avg){ if(avg==null) return ''; if(avg<3) return 'ci-dot-red'; if(avg<4) return 'ci-dot-amber'; return 'ci-dot-green'; }
  function truncate(s,n){ s=String(s||''); return s.length>n ? s.slice(0,n-1)+'…' : s; }
  function renderCheckinResultsTable(checkins){
    if(!checkins.length) return '<p class="checkin-empty">No team check-ins yet. Send the form link from the section above.</p>';
    const agg = aggregate(checkins, CHECKIN_QUESTIONS.length)
      .map(r => ({...r, text: CHECKIN_QUESTIONS[r.q]}))
      .filter(r => r.avg != null)
      .sort((a,b) => a.avg - b.avg);
    return `<table class="ci-table">
      <thead><tr><th>Question</th><th style="text-align:right;">Avg</th></tr></thead>
      <tbody>${agg.map(r => `<tr>
        <td><span class="ci-dot ${avgClass(r.avg)}"></span>${escHtml(truncate(r.text,80))}</td>
        <td class="ci-avg">${r.avg.toFixed(1)}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  }
  function renderCheckinComments(checkins){
    if(!checkins.length) return '';
    const blocks = [];
    for(let q=0; q<CHECKIN_QUESTIONS.length; q++){
      const items = checkins
        .map(c => ({ name: c.name, role: c.role, comment: (c.comments||[])[q] }))
        .filter(x => x.comment && String(x.comment).trim());
      if(items.length){
        blocks.push(`<div class="ci-q">${escHtml(CHECKIN_QUESTIONS[q])}</div>` +
          items.map(it => `<div class="ci-c"><span class="ci-author">${escHtml(it.name||'Anon')}${it.role?' · '+escHtml(it.role):''}</span>${escHtml(it.comment)}</div>`).join(''));
      }
    }
    if(!blocks.length) return '<p class="checkin-empty" style="margin-top:10px;">No comments submitted.</p>';
    return '<div class="ci-comments">' + blocks.join('') + '</div>';
  }
  function buildCheckinLink(sessionId){
    return new URL('team-checkin.html?session='+sessionId+'&type=quarterly', window.location.href).href;
  }

  function buildAgendaSteps(s){
    const tq=s.target_quarter||'';
    const pq=priorQuarter(tq)||'last quarter';
    const tqNum=(/^Q(\d)/.exec(tq)||[])[1]||'n';
    return [
      {id:'checkin',title:'Review Team Check-in',
        prompt:'Read through the aggregated team scores below. Discuss the lowest-rated statements first — they show where the team feels least confident going into '+(tq||'next quarter')+'.',
        links:[]},
      {id:1,title:'Review Last Quarter',
        prompt:'Walk through every '+pq+' goal — what hit, what missed, why.',
        links:[{href:'goals.html',text:'Open Quarterly Goals →'}]},
      {id:2,title:'Lessons + Adjustments',
        prompt:'What did we learn? What needs to change in how we plan, execute, or measure?',
        links:[]},
      {id:3,title:"Set Next Quarter's Goals",
        prompt:'Aim for 3–7 priorities this quarter. Specific, measurable, ownable.',
        links:[{href:'goals.html',text:'Open Quarterly Goals →'}]},
      {id:4,title:'Conclude — Rate the Session',
        prompt:'Rate the session 1–10. Capture decisions, action items, next steps.',
        links:[]}
    ];
  }

  function loadDetail(id){
    const s=getSession(id);
    if(!s){
      document.getElementById('session-empty').classList.remove('hidden');
      document.getElementById('session-empty').innerHTML='Session not found. <a href="quarterly-sessions.html" style="color:var(--accent);font-weight:600;">Back to Quarterly Sessions &#x2192;</a>';
      return;
    }
    _currentSession=s;
    const qn=(/^Q(\d)/.exec(s.target_quarter||'')||[])[1]||'';
    document.getElementById('ws-title').innerHTML='&#x1F3AF; '+(qn?'Q'+qn:'Quarterly')+' Planning Session — '+fmtDate(s.session_date);
    document.getElementById('ws-sub').textContent='Sets goals for '+(s.target_quarter||'next quarter')+'.';
    renderDetail(s);
  }

  function renderDetail(s){
    const c=document.getElementById('session-content');
    if(_timerInterval){clearInterval(_timerInterval);_timerInterval=null;_timerStart=null;}
    const agendaMap={};(s.agenda||[]).forEach(a=>{agendaMap[a.id]=a});
    const steps=buildAgendaSteps(s);
    const checkins=loadCheckins(s.id,'quarterly');
    const checkinLink=buildCheckinLink(s.id);
    const countTxt=checkins.length===0?'No responses yet':(checkins.length+' team '+(checkins.length===1?'response':'responses')+' received');
    const tableHtml=checkins.length
      ? renderCheckinResultsTable(checkins)
      : '<p class="checkin-empty">Share the link with your team — their feedback will appear here as they submit.</p>';
    c.innerHTML=`
      <div class="checkin-block">
        <div class="checkin-head">
          <div>
            <h3 class="checkin-title">&#x1F31F; Team Check-in</h3>
            <p class="checkin-count">${countTxt}</p>
          </div>
        </div>
        <div class="checkin-actions">
          <button class="ws-btn" id="copy-checkin-link">Copy Check-in Link</button>
          <a class="ws-btn-secondary" href="${escHtml(checkinLink)}" target="_blank" rel="noopener" style="display:inline-block;text-decoration:none;">Open Form</a>
        </div>
        ${tableHtml}
      </div>
      <div class="session-detail">
        <div class="session-detail-heading">
          <div><div class="session-detail-title">&#x1F3AF; ${fmtDate(s.session_date)} &middot; Sets ${escHtml(s.target_quarter||'')}</div></div>
          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
            <select class="field-select" id="session-status">
              <option value="scheduled" ${s.status==='scheduled'?'selected':''}>Scheduled</option>
              <option value="in_progress" ${s.status==='in_progress'?'selected':''}>In Progress</option>
              <option value="completed" ${s.status==='completed'?'selected':''}>Completed</option>
            </select>
          </div>
        </div>
        <div class="session-timer-bar">
          <button class="timer-btn" id="timer-btn">▶ Start Session</button>
          <span class="timer-elapsed hidden" id="timer-elapsed">0:00</span>
          <span style="font-size:.8rem;color:#888;font-family:inherit;">Target: half day</span>
        </div>
        <div id="agenda-accordion">
          ${steps.map((step,idx)=>{
            const a=agendaMap[step.id]||{notes:''};
            const isCheckin=(step.id==='checkin');
            const isConclude=(step.id===4);
            const displayNum=idx+1;
            const linksHtml=step.links.length?`<p class="agenda-links">${step.links.map(l=>`<a href="${l.href}">${l.text}</a>`).join('')}</p>`:'';
            const ratingHtml=isConclude?`<div style="margin-bottom:14px;"><span class="label-sm">Session Rating (1–10)</span><div class="rating-btns">${[...Array(10)].map((_,i)=>`<button class="rating-btn ${s.rating===(i+1)?'selected':''}" data-rating="${i+1}">${i+1}</button>`).join('')}</div></div>`:'';
            const notesLabel=isConclude?'Decisions, action items, next steps':'Notes';
            let body;
            if(isCheckin){
              const innerTable=checkins.length?renderCheckinResultsTable(checkins):'<p class="checkin-empty">No team check-ins yet. Send the form link from the section above.</p>';
              const commentsHtml=renderCheckinComments(checkins);
              body=`<p class="agenda-prompt">${step.prompt}</p>${innerTable}${commentsHtml}`;
            } else {
              body=`<p class="agenda-prompt">${step.prompt}</p>
                  ${linksHtml}
                  ${ratingHtml}
                  <span class="label-sm">${notesLabel}</span>
                  <textarea class="notes-textarea" data-agenda-id="${step.id}" placeholder="Type your notes here...">${escHtml(a.notes||'')}</textarea>
                  <div style="margin-top:8px;"><button class="ws-btn-secondary save-notes-btn" data-agenda-id="${step.id}">Save Notes</button></div>`;
            }
            return `
              <div class="agenda-section">
                <button class="agenda-toggle"><div class="agenda-num">${displayNum}</div><div class="agenda-title-text">${step.title}</div><span class="agenda-arrow">▼</span></button>
                <div class="agenda-content">
                  ${body}
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
    const copyBtn=c.querySelector('#copy-checkin-link');
    if(copyBtn){
      copyBtn.addEventListener('click',()=>{
        const link=buildCheckinLink(s.id);
        if(navigator.clipboard && navigator.clipboard.writeText){
          navigator.clipboard.writeText(link).then(()=>showToast('Link copied — share it with your team','success'),()=>showToast('Copy failed — '+link,'error'));
        } else {
          try{const ta=document.createElement('textarea');ta.value=link;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('Link copied — share it with your team','success');}
          catch(_){showToast('Copy failed — '+link,'error');}
        }
      });
    }
    c.querySelector('#session-status').addEventListener('change',e=>{
      try{
        updateSession(s.id,{status:e.target.value});_currentSession.status=e.target.value;showToast('Status updated','success');
        if(window.activeSession){
          if(e.target.value==='in_progress') window.activeSession.set('quarterly',s.id,(s.target_quarter||'Quarterly')+' Session');
          else if(e.target.value==='completed') window.activeSession.clear();
        }
      }
      catch(err){showToast('Update failed','error')}
    });
    const timerBtn=c.querySelector('#timer-btn'),timerEl=c.querySelector('#timer-elapsed');
    timerBtn.addEventListener('click',()=>{
      if(!_timerStart){
        _timerStart=Date.now();timerEl.classList.remove('hidden');timerBtn.textContent='⏹ End Session';timerBtn.classList.add('running');
        _timerInterval=setInterval(()=>{const sec=Math.floor((Date.now()-_timerStart)/1000);const mm=Math.floor(sec/60),ss=sec%60;timerEl.textContent=mm+':'+(ss<10?'0':'')+ss;},1000);
        try{updateSession(s.id,{status:'in_progress'});c.querySelector('#session-status').value='in_progress';_currentSession.status='in_progress';}catch(_){}
        if(window.activeSession) window.activeSession.set('quarterly',s.id,(s.target_quarter||'Quarterly')+' Session');
      }else{
        clearInterval(_timerInterval);_timerInterval=null;_timerStart=null;
        timerEl.classList.add('hidden');timerBtn.textContent='▶ Start Session';timerBtn.classList.remove('running');
        try{updateSession(s.id,{status:'completed'});c.querySelector('#session-status').value='completed';_currentSession.status='completed';}catch(_){}
        if(window.activeSession) window.activeSession.clear();
      }
    });
    c.querySelectorAll('.agenda-toggle').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const content=btn.nextElementSibling;
        const isOpen=content.classList.contains('open');
        btn.classList.toggle('open',!isOpen);
        content.classList.toggle('open',!isOpen);
      });
    });
    c.querySelectorAll('.save-notes-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const aid=parseInt(btn.dataset.agendaId);
        const ta=c.querySelector('textarea[data-agenda-id="'+aid+'"]');
        try{updateAgendaNotes(s.id,aid,ta.value);showToast('Notes saved','success');const a=(_currentSession.agenda||[]).find(x=>x.id===aid);if(a)a.notes=ta.value}
        catch(err){showToast('Save failed','error')}
      });
    });
    c.querySelectorAll('.rating-btn').forEach(btn=>btn.addEventListener('click',()=>{
      const rating=parseInt(btn.dataset.rating);
      try{updateSession(s.id,{rating});_currentSession.rating=rating;c.querySelectorAll('.rating-btn').forEach(b=>b.classList.toggle('selected',parseInt(b.dataset.rating)===rating));showToast('Rating saved','success');}
      catch(err){showToast('Save failed','error')}
    }));
  }

  (async()=>{
    const{data:{user}}=await _sb.auth.getUser();
    if(!user){window.location.href='login.html';return}
    const id=getSessionId();
    if(!id){
      document.getElementById('session-empty').classList.remove('hidden');
    }else{
      loadDetail(id);
    }
    document.body.style.opacity='1';
  })();
  </script>
</body>
</html>

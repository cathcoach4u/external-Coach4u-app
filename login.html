<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Business Coach &mdash; Sign In</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Your Business Coach">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

  <div style="display:flex;flex-direction:column;align-items:center;width:100%;max-width:420px;padding:20px;">

    <div class="login-card">
      <div class="login-logo">
        <img src="Assets/COACH4U (Final).jpg" alt="Coach4U" style="height:48px;margin-bottom:10px;display:block;margin-left:auto;margin-right:auto;">
        <h1>Your Business Coach</h1>
      </div>
      <p class="login-subtitle">Sign in to access your coaching resources.</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" required autocomplete="current-password">
            <button type="button" class="toggle-password" id="toggleBtn">Show</button>
          </div>
        </div>

        <div id="message" class="login-message"></div>

        <button type="submit" class="login-btn" id="submitBtn">Sign In</button>
      </form>

      <a href="forgot-password.html" class="login-forgot">Forgot password?</a>
    </div>

  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const SUPABASE_URL      = 'https://eekefsuaefgpqmjdyniy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Honour ?returnTo=… on safe same-origin paths (e.g. team-checkin invitations)
    function safeReturnTo() {
      try {
        const raw = new URLSearchParams(window.location.search).get('returnTo');
        if (!raw) return null;
        const u = new URL(raw, window.location.href);
        if (u.origin !== window.location.origin) return null;
        return u.pathname + u.search + u.hash;
      } catch (_) { return null; }
    }
    const RETURN_TO = safeReturnTo();
    const LANDING = RETURN_TO || 'index.html';

    const { data: { session } } = await supabase.auth.getSession();
    if (session) window.location.href = LANDING;

    const form    = document.getElementById('loginForm');
    const msgEl   = document.getElementById('message');
    const btn     = document.getElementById('submitBtn');
    const toggle  = document.getElementById('toggleBtn');
    const pwInput = document.getElementById('password');

    toggle.addEventListener('click', () => {
      if (pwInput.type === 'password') {
        pwInput.type = 'text';
        toggle.textContent = 'Hide';
      } else {
        pwInput.type = 'password';
        toggle.textContent = 'Show';
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      msgEl.style.display = 'none';
      msgEl.className = 'login-message';

      const email    = document.getElementById('email').value.trim();
      const password = pwInput.value;

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        msgEl.textContent = error.message;
        msgEl.classList.add('error');
        msgEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      } else {
        window.location.href = LANDING;
      }
    });
  </script>

</body>
</html>

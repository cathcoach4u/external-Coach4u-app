<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Past Meetings | Your Business Coach</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body{opacity:0;transition:opacity .2s ease}
    .container{padding-bottom:100px;}
    .ws-header{padding:20px 16px 0}
    .ws-title{font-size:1.15rem;font-weight:800;color:var(--primary);margin:0 0 4px}
    .ws-sub{font-size:.83rem;color:#666;margin:0 0 20px;line-height:1.45}
    .ws-btn{padding:9px 20px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;transition:background .15s}
    .ws-btn:hover{background:var(--accent-dark)}
    .ws-btn-secondary{padding:9px 18px;background:white;color:var(--primary);border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .15s}
    .ws-btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
    .page-controls{display:flex;justify-content:space-between;align-items:center;margin:0 16px 16px;flex-wrap:wrap;gap:12px}
    .meetings-list-wrap{margin:0 16px;background:white;border:1px solid var(--border);border-radius:12px;overflow:hidden}
    .meeting-item{padding:14px 16px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .12s;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .meeting-item:last-child{border-bottom:none}
    .meeting-item:hover{background:#f8faff}
    .meeting-item-date{font-family:inherit;font-weight:700;color:var(--primary);font-size:.95rem}
    .meeting-item-meta{font-size:.78rem;color:#888;margin-top:3px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .status-pill{font-size:.7rem;font-weight:700;padding:2px 7px;border-radius:20px}
    .sp-scheduled{background:#fef3c7;color:#92400e}
    .sp-in_progress{background:#dbeafe;color:#1e40af}
    .sp-completed{background:#d1fae5;color:#065f46}
    .meeting-item-arrow{color:#bbb;font-size:1rem;flex-shrink:0}
    .empty-state{padding:48px 20px;text-align:center;color:#aaa;font-family:inherit}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
    .modal-overlay.hidden{display:none}
    .modal{background:white;border-radius:16px;padding:28px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2)}
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
    .modal-title{font-family:inherit;font-weight:700;color:var(--primary);font-size:1.1rem}
    .modal-close{background:none;border:none;font-size:1.5rem;cursor:pointer;color:#888;line-height:1;padding:0 4px}
    .modal-field{margin-bottom:16px}
    .modal-label{font-family:inherit;font-weight:600;color:var(--primary);font-size:.88rem;margin-bottom:6px;display:block}
    .modal-input,.modal-select{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;font-family:inherit;font-size:.93rem;color:var(--text);background:white;box-sizing:border-box}
    .modal-input:focus,.modal-select:focus{outline:none;border-color:var(--accent)}
    .modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
    .toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-family:inherit;font-weight:600;font-size:.88rem;z-index:2000;transition:opacity .3s;box-shadow:0 4px 12px rgba(0,0,0,.15)}
    .toast-hidden{opacity:0;pointer-events:none}
    .toast-success{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
    .toast-error{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
    .hidden{display:none!important}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e5e7eb;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -2px 8px rgba(0,0,0,.06)}
    .bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0 6px;text-decoration:none;color:#aaa;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;gap:3px;transition:color .15s}
    .bottom-nav-item.active,.bottom-nav-item:hover{color:#0D9488;text-decoration:none}
    .bottom-nav-icon{font-size:20px;line-height:1}
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-left">
        <a href="operations.html" class="header-back">&#x2190; Operations</a>
        <span class="header-title">Past Meetings</span>
      </div>
      <button class="sign-out-btn" id="sign-out-btn">Sign Out</button>
    </div>
  </header>

  <div class="container">
    <div class="ws-header">
      <h1 class="ws-title">&#x1F5D3;&#xFE0F; Past Meetings</h1>
      <p class="ws-sub">Your weekly leadership meetings — past, in progress, and scheduled. Tap one to open and run it.</p>
    </div>

    <div class="page-controls">
      <span style="font-size:0.78rem;color:#888;">Tap a meeting to open and run it.</span>
      <button class="ws-btn" id="new-meeting-btn">+ New Meeting</button>
    </div>

    <div class="meetings-list-wrap">
      <div id="meetings-list"><div class="empty-state">No meetings yet. Create one with "+ New Meeting".</div></div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="new-meeting-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">New Meeting</span>
        <button class="modal-close" id="nm-modal-close">&times;</button>
      </div>
      <div class="modal-field">
        <label class="modal-label">Meeting Date *</label>
        <input type="date" class="modal-input" id="nm-date"/>
      </div>
      <div class="modal-field">
        <label class="modal-label">Quarter</label>
        <select class="modal-select" id="nm-quarter">
          <option value="Q1 2026">Q1 2026</option>
          <option value="Q2 2026" selected>Q2 2026</option>
          <option value="Q3 2026">Q3 2026</option>
          <option value="Q4 2026">Q4 2026</option>
          <option value="Q1 2027">Q1 2027</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="ws-btn-secondary" id="nm-modal-cancel">Cancel</button>
        <button class="ws-btn" id="nm-modal-save">Create &amp; Open</button>
      </div>
    </div>
  </div>

  <div class="toast toast-hidden" id="toast"></div>

  <nav class="bottom-nav">
    <a class="bottom-nav-item" href="index.html"><span class="bottom-nav-icon">&#x1F3E0;</span><span>Home</span></a>
    <a class="bottom-nav-item" href="planning.html"><span class="bottom-nav-icon">&#x1F5FA;&#xFE0F;</span><span>Planning</span></a>
    <a class="bottom-nav-item" href="strategy.html"><span class="bottom-nav-icon">&#x1F9ED;</span><span>Strategy</span></a>
    <a class="bottom-nav-item active" href="operations.html"><span class="bottom-nav-icon">&#x2699;&#xFE0F;</span><span>Operations</span></a>
    <a class="bottom-nav-item" href="learning-vault.html"><span class="bottom-nav-icon">&#x1F4DA;</span><span>Learn</span></a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
  'use strict';
  const _sb=window.supabase.createClient('https://eekefsuaefgpqmjdyniy.supabase.co','sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y');
  document.getElementById('sign-out-btn').addEventListener('click',async()=>{await _sb.auth.signOut();window.location.href='login.html';});
  function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
  function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast toast-'+type;t.classList.remove('toast-hidden');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.add('toast-hidden'),3000)}
  const _LS_KEY='coach4u_demo_meetings';
  function _genId(){return Date.now()*1000+Math.floor(Math.random()*1000)}
  function _mondayISO(d){const dt=new Date(d);const day=dt.getDay();const diff=(day===0?-6:1)-day;dt.setDate(dt.getDate()+diff);return dt.toISOString().slice(0,10)}
  function _isoAddDays(iso,n){const dt=new Date(iso+'T00:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10)}
  function _meetingsSeed(){
    const thisMon=_mondayISO(new Date());
    const nextMon=_isoAddDays(thisMon,7);
    return{
      meetings:[
        {id:4001,meeting_date:thisMon,status:'completed',quarter:'Q2 2026',rating:8,notes:'Strong week — Acme deal closed. Need to keep an eye on coach capacity.',business_id:1,
          headlines:[
            {id:4101,type:'good_news',description:'Closed largest deal of the year — £42k MRR with Acme Corp'},
            {id:4102,type:'good_news',description:'Lou completed her ICF Master certification'},
            {id:4103,type:'headline',description:'Two coaches off sick same week, capacity pressure'}
          ],
          todos:[
            {id:4201,description:'Send Q3 proposal to Globex by Friday',owner:'Cath',done:false},
            {id:4202,description:'Draft new coach JD',owner:'Lou',done:false},
            {id:4203,description:'Migrate Pipedrive contacts → HubSpot',owner:'Andrew',done:false},
            {id:4204,description:'Book Manchester event venue',owner:'Cath',done:true}
          ]
        },
        {id:4002,meeting_date:nextMon,status:'scheduled',quarter:'Q2 2026',rating:null,notes:'',business_id:1,headlines:[],todos:[]}
      ]
    };
  }
  function _meetingsLoad(){let d;try{d=JSON.parse(localStorage.getItem(_LS_KEY))}catch(_){d=null}if(!d||!d.meetings){d=_meetingsSeed();_meetingsSave(d)}return d}
  function _meetingsSave(d){localStorage.setItem(_LS_KEY,JSON.stringify(d))}
  async function api(method,path,body){
    await new Promise(r=>setTimeout(r,30));
    const [pathname]=path.split('?');
    const d=_meetingsLoad();
    if(method==='GET'&&pathname==='/meetings'){
      return d.meetings.slice().sort((a,b)=>(b.meeting_date||'').localeCompare(a.meeting_date||''))
        .map(m=>({id:m.id,meeting_date:m.meeting_date,status:m.status,quarter:m.quarter,rating:m.rating}));
    }
    if(method==='POST'&&pathname==='/meetings'){
      const m={id:_genId(),meeting_date:body.meeting_date,quarter:body.quarter||'',status:body.status||'scheduled',rating:null,notes:'',business_id:body.business_id||1,headlines:[],todos:[]};
      d.meetings.push(m);_meetingsSave(d);return m;
    }
    throw new Error('Unhandled api path: '+method+' '+pathname);
  }
  const get=p=>api('GET',p),post=(p,b)=>api('POST',p,b);
  function fmtDate(d){if(!d)return '';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}
  const STATUS_LABEL={scheduled:'Scheduled',in_progress:'In Progress',completed:'Completed'};
  const STATUS_CLASS={scheduled:'sp-scheduled',in_progress:'sp-in_progress',completed:'sp-completed'};
  async function loadMeetings(){
    try{
      const meetings=await get('/meetings');
      renderMeetingsList(meetings);
    }catch(e){showToast('Could not load meetings','error')}
  }
  function renderMeetingsList(meetings){
    const list=document.getElementById('meetings-list');
    if(!meetings.length){list.innerHTML='<div class="empty-state">No meetings yet. Create one with "+ New Meeting".</div>';return;}
    list.innerHTML=meetings.map(m=>`
      <a href="run-meeting.html?id=${m.id}" class="meeting-item" style="text-decoration:none;color:inherit;">
        <div>
          <div class="meeting-item-date">${fmtDate(m.meeting_date)}</div>
          <div class="meeting-item-meta">
            <span class="status-pill ${STATUS_CLASS[m.status]||'sp-scheduled'}">${STATUS_LABEL[m.status]||m.status}</span>
            ${m.quarter?escHtml(m.quarter):''}
            ${m.rating?'&middot; '+m.rating+'/10':''}
          </div>
        </div>
        <span class="meeting-item-arrow">&#x203A;</span>
      </a>
    `).join('');
  }
  document.getElementById('new-meeting-btn').addEventListener('click',()=>{
    document.getElementById('nm-date').value=new Date().toISOString().slice(0,10);
    document.getElementById('new-meeting-modal').classList.remove('hidden');
  });
  const closeNMModal=()=>document.getElementById('new-meeting-modal').classList.add('hidden');
  document.getElementById('nm-modal-close').addEventListener('click',closeNMModal);
  document.getElementById('nm-modal-cancel').addEventListener('click',closeNMModal);
  document.getElementById('nm-modal-save').addEventListener('click',async()=>{
    const meeting_date=document.getElementById('nm-date').value;
    const quarter=document.getElementById('nm-quarter').value;
    if(!meeting_date){showToast('Date is required','error');return}
    try{
      const m=await post('/meetings',{meeting_date,quarter,status:'scheduled'});
      window.location.href='run-meeting.html?id='+m.id;
    }catch(e){showToast('Create failed: '+e.message,'error')}
  });
  (async()=>{
    const{data:{user}}=await _sb.auth.getUser();
    if(!user){window.location.href='login.html';return}
    await loadMeetings();
    document.body.style.opacity='1';
  })();
  </script>
</body>
</html>

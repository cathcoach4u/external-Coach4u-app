<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThriveHQ — Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230D9488' width='100' height='100'/><text x='50' y='65' font-size='60' fill='white' text-anchor='middle' font-weight='bold'>T</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <h1 class="brand-name">ThriveHQ</h1>
        <button class="sign-out-btn" onclick="window.signOut()">Sign Out</button>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div id="loading" class="loading">Loading your dashboard...</div>
    <div id="error" class="error" style="display: none;"></div>

    <div id="content" style="display: none;">
      <!-- Welcome Section -->
      <section class="welcome-section">
        <h2 class="welcome-heading">Welcome back</h2>
        <div id="membershipCard" class="membership-card">
          <div class="membership-status">Active Member</div>
          <div class="membership-expires">Membership expires: <span id="expiryDate">—</span></div>
        </div>
      </section>

      <!-- Brain Pulse Results -->
      <section class="brain-pulse-section">
        <h3 class="section-title">Your Brain Pulse Results</h3>
        <div class="pulse-grid" id="pulseGrid">
          <!-- Dynamically populated -->
        </div>
      </section>

      <!-- Session Info -->
      <section class="session-section">
        <h3 class="section-title">Upcoming Sessions</h3>
        <div class="session-card">
          <div class="session-day">Tuesday</div>
          <div class="session-time">6:00 PM AEST</div>
          <div class="session-type">Coaching Session</div>
        </div>
        <div class="session-card">
          <div class="session-day">Thursday</div>
          <div class="session-time">12:00 PM AEST</div>
          <div class="session-type">Body Doubling</div>
        </div>
      </section>

      <!-- Quick Links -->
      <section class="quick-links-section">
        <h3 class="section-title">Quick Links</h3>
        <div class="links-grid">
          <a href="resources.html" class="quick-link">
            <span class="link-icon">📚</span>
            <span class="link-text">Resources</span>
            <span class="link-arrow">→</span>
          </a>
          <a href="account.html" class="quick-link">
            <span class="link-icon">⚙️</span>
            <span class="link-text">Account</span>
            <span class="link-arrow">→</span>
          </a>
        </div>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      const user = await window.requireAuth();
      if (!user) return;

      try {
        await window.initDashboard();
      } catch (error) {
        console.error('Error loading dashboard:', error);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Error loading dashboard. Please refresh.';
      }
    });

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('Service Worker registered'))
        .catch(err => console.log('SW registration failed:', err));
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThriveHQ — Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230D9488' width='100' height='100'/><text x='50' y='65' font-size='60' fill='white' text-anchor='middle' font-weight='bold'>T</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <h1 class="brand-name">ThriveHQ</h1>
        <button class="sign-out-btn" onclick="window.signOut()">Sign Out</button>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div id="loading" class="loading">Loading your dashboard...</div>
    <div id="error" class="error" style="display: none;"></div>

    <div id="content" style="display: none;">
      <!-- Welcome Section -->
      <section class="welcome-section">
        <h2 class="welcome-heading">Welcome back</h2>
        <div id="membershipCard" class="membership-card">
          <div class="membership-status">Active Member</div>
          <div class="membership-expires">Membership expires: <span id="expiryDate">—</span></div>
        </div>
      </section>

      <!-- Brain Pulse Results -->
      <section class="brain-pulse-section">
        <h3 class="section-title">Your Brain Pulse Results</h3>
        <div class="pulse-grid" id="pulseGrid">
          <!-- Dynamically populated -->
        </div>
      </section>

      <!-- Session Info -->
      <section class="session-section">
        <h3 class="section-title">Upcoming Sessions</h3>
        <div class="session-card">
          <div class="session-day">Tuesday</div>
          <div class="session-time">6:00 PM AEST</div>
          <div class="session-type">Coaching Session</div>
        </div>
        <div class="session-card">
          <div class="session-day">Thursday</div>
          <div class="session-time">12:00 PM AEST</div>
          <div class="session-type">Body Doubling</div>
        </div>
      </section>

      <!-- Quick Links -->
      <section class="quick-links-section">
        <h3 class="section-title">Quick Links</h3>
        <div class="links-grid">
          <a href="resources.html" class="quick-link">
            <span class="link-icon">📚</span>
            <span class="link-text">Resources</span>
            <span class="link-arrow">→</span>
          </a>
          <a href="account.html" class="quick-link">
            <span class="link-icon">⚙️</span>
            <span class="link-text">Account</span>
            <span class="link-arrow">→</span>
          </a>
        </div>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://eekefsuaefgpqmjdyniy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y';

    let supabase;

    const PULSE_SECTIONS = {
      capacity: {
        name: 'Capacity',
        icon: 'C',
        description: 'The steadiness and resilience of your nervous system',
        details: 'How calm you feel, how quickly you recover, and how much energy you have.',
        focus: [
          'Notice when your tank is running low and refill before you crash.',
          'Use your regulation tools (breathing, movement, connection) early, not only in crisis.',
          'Honour the recovery you need — rest is part of the rhythm, not a reward.'
        ]
      },
      wellbeing: {
        name: 'Wellbeing',
        icon: 'W',
        description: 'What gives your life meaning and sustains you',
        details: 'Your sense of purpose, connection, security, health, and belonging.',
        focus: [
          'Protect one thing each week that gives your life meaning.',
          'Strengthen one relationship that supports you most.',
          'Attend to one pillar at a time (purpose, social, financial, physical, community).'
        ]
      },
      strengths: {
        name: 'Strengths',
        icon: 'S',
        description: 'How you talk to yourself and trust yourself',
        details: 'Your confidence in decisions, self-compassion, and ability to reframe setbacks.',
        focus: [
          'Catch the critical inner voice earlier and soften it.',
          'Name one thing you did well this week, even if it feels small.',
          'Accept how you are built rather than fighting it.'
        ]
      },
      execution: {
        name: 'Execution',
        icon: 'E',
        description: 'How you manage everyday brain tasks',
        details: 'Starting, finishing, pausing, prioritizing, and remembering.',
        focus: [
          'Start the one task you keep avoiding before the day\'s energy drops.',
          'Use a visible cue to bring you back when you drift off-track.',
          'Pair a hard task with a small anchor to make starting easier.'
        ]
      }
    };

    function initSupabase() {
      if (typeof window.supabase === 'undefined') return null;
      if (!supabase) {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }
      return supabase;
    }

    async function getCurrentUser() {
      const sb = initSupabase();
      if (!sb) return null;
      try {
        const { data: { user } } = await sb.auth.getUser();
        return user;
      } catch (error) {
        return null;
      }
    }

    async function checkMembership(userId) {
      const sb = initSupabase();
      if (!sb) return false;
      try {
        const { data: userData } = await sb
          .from('users')
          .select('membership_status')
          .eq('id', userId)
          .single();
        return userData?.membership_status === 'active';
      } catch (error) {
        return false;
      }
    }

    async function initDashboard() {
      const sb = initSupabase();
      if (!sb) throw new Error('Supabase not initialized');

      const user = await getCurrentUser();
      if (!user) {
        window.location.href = 'index.html';
        return;
      }

      try {
        const { data: userData } = await sb
          .from('users')
          .select('*')
          .eq('id', user.id)
          .single();

        const { data: assessments } = await sb
          .from('brain_pulse_assessments')
          .select('*')
          .eq('user_id', user.id)
          .order('assessment_date', { ascending: false })
          .limit(1);

        const assessment = assessments && assessments.length > 0 ? assessments[0] : null;

        if (userData && userData.membership_end_date) {
          document.getElementById('expiryDate').textContent = formatDate(userData.membership_end_date);
        }

        renderPulseCards(assessment);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
      } catch (error) {
        console.error('Error initializing dashboard:', error);
        throw error;
      }
    }

    function renderPulseCards(assessment) {
      const grid = document.getElementById('pulseGrid');
      grid.innerHTML = '';

      const scores = {
        capacity: assessment?.capacity_score || 0,
        wellbeing: assessment?.wellbeing_score || 0,
        strengths: assessment?.strengths_score || 0,
        execution: assessment?.execution_score || 0
      };

      Object.entries(PULSE_SECTIONS).forEach(([key, section]) => {
        const score = scores[key];
        const card = document.createElement('div');
        card.className = 'pulse-card';
        card.onclick = () => window.location.href = `brain-pulse-detail.html?section=${key}`;

        card.innerHTML = `
          <div class="pulse-header">
            <div class="pulse-icon ${key}">${section.icon}</div>
            <div class="pulse-title">${section.name}</div>
          </div>
          <div class="pulse-score">${score}<span style="font-size: 16px;">/50</span></div>
          <div class="pulse-description">${section.description}</div>
        `;

        grid.appendChild(card);
      });
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString('en-AU', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    async function signOut() {
      const sb = initSupabase();
      if (!sb) return;
      const { error } = await sb.auth.signOut();
      if (!error) window.location.href = 'index.html';
    }

    window.addEventListener('DOMContentLoaded', async () => {
      const user = await getCurrentUser();
      if (!user) {
        window.location.href = 'index.html';
        return;
      }

      const isMember = await checkMembership(user.id);
      if (!isMember) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Your membership has expired. Contact support to renew.';
        return;
      }

      try {
        await initDashboard();
      } catch (error) {
        console.error('Error loading dashboard:', error);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Error loading dashboard. Please refresh.';
      }
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .catch(err => console.log('Service Worker registration failed:', err));
    }
  </script>
</body>
</html>

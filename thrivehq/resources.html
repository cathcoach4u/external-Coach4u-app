<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThriveHQ — Resources</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <a href="dashboard.html" class="back-link">← Back</a>
        <h1 class="brand-name">Resources</h1>
        <button class="sign-out-btn" onclick="window.signOut()">Sign Out</button>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div id="loading" class="loading">Loading resources...</div>
    <div id="error" class="error" style="display: none;"></div>

    <div id="content" style="display: none;">
      <div class="resources-list" id="resourcesList">
        <!-- Dynamically populated -->
      </div>

      <div class="empty-state" id="emptyState" style="display: none;">
        <p>No resources available yet. Check back soon!</p>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://eekefsuaefgpqmjdyniy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y';
    let supabase;

    function initSupabase() {
      if (typeof window.supabase === 'undefined') return null;
      if (!supabase) {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }
      return supabase;
    }

    async function getCurrentUser() {
      const sb = initSupabase();
      if (!sb) return null;
      try {
        const { data: { user } } = await sb.auth.getUser();
        return user;
      } catch (error) {
        return null;
      }
    }

    async function checkMembership(userId) {
      const sb = initSupabase();
      if (!sb) return false;
      try {
        const { data: userData } = await sb
          .from('users')
          .select('membership_status')
          .eq('id', userId)
          .single();
        return userData?.membership_status === 'active';
      } catch (error) {
        return false;
      }
    }

    async function loadResources() {
      const sb = initSupabase();
      if (!sb) throw new Error('Supabase not initialized');

      try {
        const { data: resources } = await sb
          .from('resources')
          .select('*')
          .order('created_at', { ascending: false });

        const list = document.getElementById('resourcesList');
        const empty = document.getElementById('emptyState');

        if (!resources || resources.length === 0) {
          empty.style.display = 'block';
        } else {
          list.innerHTML = resources.map(r => `
            <a href="${r.url}" target="_blank" class="resource-item">
              <div class="resource-title">${r.title}</div>
              <div class="resource-description">${r.description || 'ADHD resource'}</div>
              <div class="resource-link">View Resource →</div>
            </a>
          `).join('');
        }

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
      } catch (error) {
        console.error('Error loading resources:', error);
        throw error;
      }
    }

    async function signOut() {
      const sb = initSupabase();
      if (!sb) return;
      const { error } = await sb.auth.signOut();
      if (!error) window.location.href = 'index.html';
    }

    window.addEventListener('DOMContentLoaded', async () => {
      const user = await getCurrentUser();
      if (!user) {
        window.location.href = 'index.html';
        return;
      }

      const isMember = await checkMembership(user.id);
      if (!isMember) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Your membership has expired.';
        return;
      }

      try {
        await loadResources();
      } catch (error) {
        console.error('Error loading resources:', error);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Error loading resources.';
      }
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .catch(err => console.log('Service Worker registration failed:', err));
    }
  </script>
</body>
</html>

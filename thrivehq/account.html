<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThriveHQ — Account</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <a href="dashboard.html" class="back-link">← Back</a>
        <h1 class="brand-name">Account</h1>
        <button class="sign-out-btn" onclick="window.signOut()">Sign Out</button>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div id="loading" class="loading">Loading account...</div>
    <div id="error" class="error" style="display: none;"></div>

    <div id="content" style="display: none;">
      <section class="account-section">
        <h2 class="section-title">Profile</h2>
        <div class="info-card">
          <div class="info-row">
            <span class="label">Email</span>
            <span class="value" id="userEmail">—</span>
          </div>
          <div class="info-row">
            <span class="label">Name</span>
            <span class="value" id="userName">—</span>
          </div>
        </div>
      </section>

      <section class="account-section">
        <h2 class="section-title">Membership</h2>
        <div class="info-card">
          <div class="info-row">
            <span class="label">Status</span>
            <span class="value" id="membershipStatus">—</span>
          </div>
          <div class="info-row">
            <span class="label">Starts</span>
            <span class="value" id="startDate">—</span>
          </div>
          <div class="info-row">
            <span class="label">Expires</span>
            <span class="value" id="endDate">—</span>
          </div>
        </div>
      </section>

      <section class="account-section">
        <h2 class="section-title">Support</h2>
        <p class="help-text">Need help? Reach out to the ThriveHQ team at <a href="mailto:support@coach4u.com.au">support@coach4u.com.au</a></p>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://eekefsuaefgpqmjdyniy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y';
    let supabase;

    function initSupabase() {
      if (typeof window.supabase === 'undefined') return null;
      if (!supabase) {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }
      return supabase;
    }

    async function getCurrentUser() {
      const sb = initSupabase();
      if (!sb) return null;
      try {
        const { data: { user } } = await sb.auth.getUser();
        return user;
      } catch (error) {
        return null;
      }
    }

    async function checkMembership(userId) {
      const sb = initSupabase();
      if (!sb) return false;
      try {
        const { data: userData } = await sb
          .from('users')
          .select('membership_status')
          .eq('id', userId)
          .single();
        return userData?.membership_status === 'active';
      } catch (error) {
        return false;
      }
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString('en-AU', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    async function loadAccount() {
      const sb = initSupabase();
      if (!sb) throw new Error('Supabase not initialized');

      const user = await getCurrentUser();
      if (!user) return;

      try {
        const { data: userData } = await sb
          .from('users')
          .select('*')
          .eq('id', user.id)
          .single();

        document.getElementById('userEmail').textContent = user.email || '—';
        document.getElementById('userName').textContent = userData?.name || '—';
        document.getElementById('membershipStatus').textContent = userData?.membership_status || '—';
        document.getElementById('startDate').textContent = userData?.membership_start_date ? formatDate(userData.membership_start_date) : '—';
        document.getElementById('endDate').textContent = userData?.membership_end_date ? formatDate(userData.membership_end_date) : '—';

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
      } catch (error) {
        console.error('Error loading account:', error);
        throw error;
      }
    }

    async function signOut() {
      const sb = initSupabase();
      if (!sb) return;
      const { error } = await sb.auth.signOut();
      if (!error) window.location.href = 'index.html';
    }

    window.addEventListener('DOMContentLoaded', async () => {
      const user = await getCurrentUser();
      if (!user) {
        window.location.href = 'index.html';
        return;
      }

      const isMember = await checkMembership(user.id);
      if (!isMember) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Your membership has expired.';
        return;
      }

      try {
        await loadAccount();
      } catch (error) {
        console.error('Error loading account:', error);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Error loading account.';
      }
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .catch(err => console.log('Service Worker registration failed:', err));
    }
  </script>
</body>
</html>

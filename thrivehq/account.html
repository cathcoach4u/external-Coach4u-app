<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThriveHQ — Account</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <a href="dashboard.html" class="back-link">← Back</a>
        <h1 class="brand-name">Account</h1>
        <button class="sign-out-btn" onclick="window.signOut()">Sign Out</button>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div id="loading" class="loading">Loading account...</div>
    <div id="error" class="error" style="display: none;"></div>

    <div id="content" style="display: none;">
      <section class="account-section">
        <h2 class="section-title">Profile</h2>
        <div class="info-card">
          <div class="info-row">
            <span class="label">Email</span>
            <span class="value" id="userEmail">—</span>
          </div>
          <div class="info-row">
            <span class="label">Name</span>
            <span class="value" id="userName">—</span>
          </div>
        </div>
      </section>

      <section class="account-section">
        <h2 class="section-title">Membership</h2>
        <div class="info-card">
          <div class="info-row">
            <span class="label">Status</span>
            <span class="value" id="membershipStatus">—</span>
          </div>
          <div class="info-row">
            <span class="label">Starts</span>
            <span class="value" id="startDate">—</span>
          </div>
          <div class="info-row">
            <span class="label">Expires</span>
            <span class="value" id="endDate">—</span>
          </div>
        </div>
      </section>

      <section class="account-section">
        <h2 class="section-title">Support</h2>
        <p class="help-text">Need help? Reach out to the ThriveHQ team at <a href="mailto:support@coach4u.com.au">support@coach4u.com.au</a></p>
      </section>
    </div>
  </main>

  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      const user = await window.requireAuth();
      if (!user) return;

      try {
        await window.loadAccount();
      } catch (error) {
        console.error('Error loading account:', error);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Error loading account.';
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketing | Your Business Coach</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Your Business Coach">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { opacity: 0; transition: opacity 0.2s ease; }

    .page-hero {
      background: linear-gradient(135deg, #003366 0%, #0D9488 100%);
      border-radius: 12px;
      padding: 24px 20px;
      margin-bottom: 20px;
      color: white;
    }
    .page-hero h1 { font-size: 1.4rem; font-weight: 800; margin: 0 0 6px; }
    .page-hero p  { font-size: 0.88rem; opacity: 0.85; margin: 0; line-height: 1.5; }

    .content-card {
      background: white;
      border-radius: 10px;
      border: 2px solid var(--accent);
      padding: 20px;
      margin-bottom: 16px;
    }
    .content-card h2 {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--primary);
      margin: 0 0 12px;
    }
    .content-card label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
      margin-top: 14px;
    }
    .content-card label:first-of-type { margin-top: 0; }
    .content-card textarea {
      width: 100%;
      min-height: 100px;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px;
      font-size: 0.88rem;
      font-family: inherit;
      resize: vertical;
      box-sizing: border-box;
      color: #333;
    }
    .content-card textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(13,148,136,0.15);
    }

    .save-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-top: 4px;
      transition: background 0.15s;
    }
    .save-btn:hover { background: var(--accent-dark); }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-left">
        <a href="strategy.html" class="header-back">&#x2190; Strategy</a>
        <span class="header-title">Marketing</span>
      </div>
      <button id="signOutBtn" class="sign-out-btn">Sign Out</button>
    </div>
  </header>

  <div class="container">

    <div class="page-hero">
      <h1>Marketing</h1>
      <p>How you attract and retain your ideal clients.</p>
    </div>

    <div class="content-card">
      <h2>Marketing Strategy</h2>

      <label for="channels">Marketing channels &amp; approach</label>
      <textarea id="channels" placeholder="Describe the channels and methods you use to reach your ideal clients..."></textarea>

      <label for="messages">Key messages</label>
      <textarea id="messages" placeholder="What are the core messages that resonate with your target audience..."></textarea>
    </div>

    <button class="save-btn" id="saveBtn">Save</button>

  </div>

  <footer class="site-footer">
    Strengths-Based Coaching and Counselling<br>
    <a href="http://www.coach4u.com.au">www.coach4u.com.au</a> |
    <a href="mailto:cath@coach4u.com.au">cath@coach4u.com.au</a> |
    0402 313 337
  </footer>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient(
      'https://eekefsuaefgpqmjdyniy.supabase.co',
      'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y'
    );
    const { data: { user }, error } = await supabase.auth.getUser();
    if (!user || error) { window.location.href = 'login.html'; }
    else {
      const { data: profile } = await supabase
        .from('users').select('membership_status').eq('id', user.id).single();
      if (!profile || profile.membership_status !== 'active') {
        window.location.href = 'inactive.html';
      } else {
        document.body.style.opacity = '1';
        document.getElementById('signOutBtn').addEventListener('click', async () => {
          await supabase.auth.signOut();
          window.location.href = 'login.html';
        });
        document.getElementById('saveBtn').addEventListener('click', () => {
          alert('Saved! (persistence coming soon)');
        });
      }
    }
  </script>
</body>
</html>

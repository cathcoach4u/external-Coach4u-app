<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strategy | Your Business Coach</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Your Business Coach">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { opacity: 0; transition: opacity 0.2s ease; }

    .modules-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 32px;
    }

    .module-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 11px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fafafa;
      text-decoration: none;
      transition: box-shadow 0.15s, border-color 0.15s, background 0.15s;
    }
    .module-card:hover {
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      border-color: #ccc;
      text-decoration: none;
    }
    .mod-icon {
      width: 30px; height: 30px; border-radius: 6px;
      background: rgba(13,148,136,0.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }
    .mod-name { font-size: 12px; font-weight: 700; color: var(--primary); line-height: 1.3; flex: 1; }
    .mod-arrow { font-size: 12px; color: #ccc; flex-shrink: 0; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-left">
        <a href="index.html" class="header-back">&#x2190; Home</a>
        <span class="header-title">Strategy</span>
      </div>
      <button id="signOutBtn" class="sign-out-btn">Sign Out</button>
    </div>
  </header>

  <div class="container">

    <div class="modules-grid">

      <a class="module-card" href="business/vision-strategy.html">
        <div class="mod-icon">&#x25CE;</div>
        <div class="mod-name">Core Focus</div>
        <span class="mod-arrow">&#x203A;</span>
      </a>

      <a class="module-card" href="values.html">
        <div class="mod-icon">&#x2605;</div>
        <div class="mod-name">Core Values</div>
        <span class="mod-arrow">&#x203A;</span>
      </a>

      <a class="module-card" href="marketing.html">
        <div class="mod-icon">&#x25C8;</div>
        <div class="mod-name">Marketing</div>
        <span class="mod-arrow">&#x203A;</span>
      </a>

      <a class="module-card" href="targeting.html">
        <div class="mod-icon">&#x25C9;</div>
        <div class="mod-name">Targeting</div>
        <span class="mod-arrow">&#x203A;</span>
      </a>

    </div>

  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient(
      'https://eekefsuaefgpqmjdyniy.supabase.co',
      'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y'
    );
    const { data: { user }, error } = await supabase.auth.getUser();
    if (!user || error) { window.location.href = 'login.html'; }
    else {
      const { data: profile } = await supabase
        .from('users').select('membership_status').eq('id', user.id).single();
      if (!profile || profile.membership_status !== 'active') {
        window.location.href = 'inactive.html';
      } else {
        document.body.style.opacity = '1';
        document.getElementById('signOutBtn').addEventListener('click', async () => {
          await supabase.auth.signOut();
          window.location.href = 'login.html';
        });
      }
    }
  </script>
</body>
</html>

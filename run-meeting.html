<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Run Meeting | Your Business Coach</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body{opacity:0;transition:opacity .2s ease}
    .container{padding-bottom:100px;}
    .ws-header{padding:20px 16px 0}
    .ws-title{font-size:1.15rem;font-weight:800;color:var(--primary);margin:0 0 4px}
    .ws-sub{font-size:.83rem;color:#666;margin:0 0 20px;line-height:1.45}
    .ws-btn{padding:9px 20px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;transition:background .15s}
    .ws-btn:hover{background:var(--accent-dark)}
    .ws-btn-secondary{padding:9px 18px;background:white;color:var(--primary);border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .15s}
    .ws-btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
    .meeting-detail{background:white;border:1px solid var(--border);border-radius:12px;padding:24px;margin:0 16px}
    .meeting-empty{text-align:center;padding:48px 20px;color:#aaa;font-family:inherit;background:white;border:1px solid var(--border);border-radius:12px;margin:0 16px}
    .meeting-detail-heading{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px}
    .meeting-detail-title{font-family:inherit;font-weight:700;color:var(--primary);font-size:1.15rem}
    .field-select{border:1.5px solid var(--border);border-radius:8px;padding:7px 12px;font-family:inherit;font-size:.85rem;color:var(--primary);background:white;cursor:pointer}
    .status-pill{font-size:.7rem;font-weight:700;padding:2px 7px;border-radius:20px}
    .sp-scheduled{background:#fef3c7;color:#92400e}
    .sp-in_progress{background:#dbeafe;color:#1e40af}
    .sp-completed{background:#d1fae5;color:#065f46}
    .agenda-section{border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden}
    .agenda-toggle{width:100%;display:flex;align-items:center;gap:12px;padding:14px 16px;background:#f0fdfa;border:none;cursor:pointer;text-align:left;transition:background .12s}
    .agenda-toggle:hover{background:#eef2fa}
    .agenda-num{width:26px;height:26px;border-radius:50%;background:var(--primary);color:white;display:grid;place-items:center;font-family:inherit;font-weight:700;font-size:.82rem;flex-shrink:0}
    .agenda-title-text{font-family:inherit;font-weight:700;color:var(--primary);font-size:.93rem;flex:1}
    .agenda-time{font-size:.78rem;color:var(--accent);font-family:inherit;font-weight:600}
    .agenda-arrow{margin-left:8px;font-size:.8rem;color:#aaa;transition:transform .2s}
    .agenda-toggle.open .agenda-arrow{transform:rotate(180deg)}
    .agenda-content{display:none;padding:16px}
    .agenda-content.open{display:block}
    .item-list{list-style:none;margin:0 0 12px;padding:0}
    .item-list li{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border:1px solid #f0f0f0;border-radius:8px;margin-bottom:6px;font-size:.88rem;font-family:inherit}
    .item-list li .item-text{flex:1;color:var(--text)}
    .item-list li .item-meta{font-size:.75rem;color:#aaa;white-space:nowrap}
    .item-del-btn{background:none;border:none;cursor:pointer;color:#ccc;font-size:1rem;padding:0 4px;line-height:1}
    .item-del-btn:hover{color:#991b1b}
    .item-add-row{display:flex;gap:8px}
    .item-add-input{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-family:inherit;font-size:.88rem;color:var(--text)}
    .item-add-input:focus{outline:none;border-color:var(--accent)}
    .meeting-timer-bar{display:flex;align-items:center;gap:12px;background:#f0fdfa;border-radius:8px;padding:10px 14px;margin-bottom:16px}
    .timer-btn{font-family:inherit;font-weight:700;font-size:.85rem;padding:6px 14px;border-radius:6px;cursor:pointer;border:1.5px solid var(--accent);background:white;color:var(--primary);transition:all .15s}
    .timer-btn.running{border-color:#991b1b;color:#991b1b;background:#fff5f5}
    .timer-elapsed{font-family:inherit;font-weight:700;font-size:1rem;color:var(--primary);font-variant-numeric:tabular-nums}
    .rating-btns{display:flex;gap:8px;flex-wrap:wrap}
    .rating-btn{width:40px;height:40px;border-radius:8px;border:2px solid var(--border);background:white;cursor:pointer;font-family:inherit;font-weight:700;font-size:.9rem;transition:all .15s}
    .rating-btn.selected{background:var(--primary);color:white;border-color:var(--primary)}
    .notes-textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;font-family:inherit;font-size:.88rem;resize:vertical;min-height:80px;box-sizing:border-box}
    .notes-textarea:focus{outline:none;border-color:var(--accent)}
    .toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-family:inherit;font-weight:600;font-size:.88rem;z-index:2000;transition:opacity .3s;box-shadow:0 4px 12px rgba(0,0,0,.15)}
    .toast-hidden{opacity:0;pointer-events:none}
    .toast-success{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
    .toast-error{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
    .hidden{display:none!important}
    .label-sm{font-family:inherit;font-weight:600;color:var(--primary);font-size:.85rem;margin-bottom:8px;display:block}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e5e7eb;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -2px 8px rgba(0,0,0,.06)}
    .bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0 6px;text-decoration:none;color:#aaa;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;gap:3px;transition:color .15s}
    .bottom-nav-item.active,.bottom-nav-item:hover{color:#0D9488;text-decoration:none}
    .bottom-nav-icon{font-size:20px;line-height:1}
  </style>
  <script src="js/active-session.js" defer></script>
  <script src="js/active-org.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-left">
        <a href="meeting.html" class="header-back">&#x2190; Past Meetings</a>
        <span class="header-title">Your Business Coach</span>
        <span id="activeBizName" class="biz-pill"></span>
      </div>
      <button class="sign-out-btn" id="signOutBtn">Sign Out</button>
    </div>
  </header>

  <div class="container">
    <div class="ws-header">
      <h1 class="ws-title" id="ws-title">&#x1F5D3;&#xFE0F; Run Meeting</h1>
      <p class="ws-sub" id="ws-sub">Work through the agenda, capture headlines, track to-dos, and rate the meeting.</p>
    </div>

    <div class="meeting-detail meeting-empty hidden" id="meeting-empty">
      No meeting selected. <a href="meeting.html" style="color:var(--accent);font-weight:600;">Back to Past Meetings &#x2192;</a>
    </div>
    <div id="meeting-content"></div>
  </div>

  <div class="toast toast-hidden" id="toast"></div>

  <nav class="bottom-nav">
    <a class="bottom-nav-item" href="business.html"><span class="bottom-nav-icon">&#x1F3E0;</span><span>Home</span></a>
    <a class="bottom-nav-item" href="planning.html"><span class="bottom-nav-icon">&#x1F5FA;&#xFE0F;</span><span>Planning</span></a>
    <a class="bottom-nav-item" href="strategy.html"><span class="bottom-nav-icon">&#x1F9ED;</span><span>Strategy</span></a>
    <a class="bottom-nav-item active" href="operations.html"><span class="bottom-nav-icon">&#x2699;&#xFE0F;</span><span>Operations</span></a>
    <a class="bottom-nav-item" href="learning-vault.html"><span class="bottom-nav-icon">&#x1F4DA;</span><span>Learn</span></a>
  </nav>

  <script type="module">
  'use strict';
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
  const supabase = createClient(
    'https://eekefsuaefgpqmjdyniy.supabase.co',
    'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y'
  );

  /* Previous localStorage SEED (kept here as a reference for sample data only —
     no longer auto-applied. Headlines and todos are now read from Supabase
     tables `meeting_headlines` and `meeting_todos`, scoped by meeting_id.)
  */

  let orgId = null;
  let meetingId = null;
  let _currentMeeting=null, _headlines=[], _todos=[];
  let _timerInterval=null, _timerStart=null;

  function escHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
  function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast toast-'+type;t.classList.remove('toast-hidden');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.add('toast-hidden'),3000)}
  function fmtDate(d){if(!d)return '';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}

  function getMeetingId(){
    const u = new URLSearchParams(window.location.search);
    return u.get('id') || null;
  }

  async function loadDetail(id){
    const [meetingRes, headlinesRes, todosRes] = await Promise.all([
      supabase.from('meetings').select('*').eq('id', id).maybeSingle(),
      supabase.from('meeting_headlines').select('*').eq('meeting_id', id).order('created_at', { ascending: true }),
      supabase.from('meeting_todos').select('*').eq('meeting_id', id).order('created_at', { ascending: true })
    ]);
    if (meetingRes.error || !meetingRes.data) {
      console.warn('Load meeting failed:', meetingRes.error && meetingRes.error.message);
      document.getElementById('meeting-empty').classList.remove('hidden');
      document.getElementById('meeting-empty').innerHTML='Meeting not found. <a href="meeting.html" style="color:var(--accent);font-weight:600;">Back to Past Meetings &#x2192;</a>';
      return;
    }
    _currentMeeting = meetingRes.data;
    _headlines = (!headlinesRes.error && Array.isArray(headlinesRes.data)) ? headlinesRes.data : [];
    _todos = (!todosRes.error && Array.isArray(todosRes.data)) ? todosRes.data : [];
    if (headlinesRes.error) console.warn('Load headlines failed:', headlinesRes.error.message);
    if (todosRes.error) console.warn('Load todos failed:', todosRes.error.message);

    document.getElementById('ws-title').innerHTML='&#x1F5D3;&#xFE0F; '+fmtDate(_currentMeeting.meeting_date);
    document.getElementById('ws-sub').textContent=(_currentMeeting.quarter?_currentMeeting.quarter+' — ':'')+'Work through the agenda below.';
    renderDetail();
  }

  function renderDetail(){
    const m = _currentMeeting;
    const c=document.getElementById('meeting-content');
    if(_timerInterval){clearInterval(_timerInterval);_timerInterval=null;_timerStart=null;}
    c.innerHTML=`
      <div class="meeting-detail">
        <div class="meeting-detail-heading">
          <div><div class="meeting-detail-title">&#x1F5D3; ${fmtDate(m.meeting_date)}</div></div>
          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
            <select class="field-select" id="meeting-status">
              <option value="scheduled" ${m.status==='scheduled'?'selected':''}>Scheduled</option>
              <option value="in_progress" ${m.status==='in_progress'?'selected':''}>In Progress</option>
              <option value="completed" ${m.status==='completed'?'selected':''}>Completed</option>
            </select>
          </div>
        </div>
        <div class="meeting-timer-bar">
          <button class="timer-btn" id="timer-btn">▶ Start Meeting</button>
          <span class="timer-elapsed hidden" id="timer-elapsed">0:00</span>
          <span style="font-size:.8rem;color:#888;font-family:inherit;">Target: 90 min</span>
        </div>
        <div id="agenda-accordion">
          ${agendaSection(1,'Segue &#x2014; Good News','5 min',renderSegue())}
          ${agendaSection(2,'Numbers Review','5 min','<p style="font-size:.88rem;color:#888;font-family:inherit;">Review your weekly numbers. <a href="scorecard.html" style="color:var(--accent);">Open Weekly Numbers &#x2192;</a></p>')}
          ${agendaSection(3,'Priorities Review','5 min','<p style="font-size:.88rem;color:#888;font-family:inherit;">Review quarterly goals. <a href="goals.html" style="color:var(--accent);">Open Goals &#x2192;</a></p>')}
          ${agendaSection(4,'Customer &amp; Employee Headlines','5 min',renderHeadlines())}
          ${agendaSection(5,'To-Do List','5 min',renderTodos())}
          ${agendaSection(6,'Issues &#x2014; Identify, Discuss, Solve','60 min','<p style="font-size:.88rem;color:#888;font-family:inherit;">Work through your issues list. <a href="issues.html" style="color:var(--accent);">Open Issues &#x2192;</a></p>')}
          ${agendaSection(7,'Conclude &amp; Rate','5 min',renderConclude())}
        </div>
      </div>
    `;
    c.querySelector('#meeting-status').addEventListener('change',async e=>{
      const status = e.target.value;
      const { error } = await supabase.from('meetings').update({ status }).eq('id', m.id);
      if (error) { console.warn('Update meeting status failed:', error.message); showToast('Update failed','error'); return; }
      _currentMeeting.status = status;
      showToast('Status updated','success');
    });
    const timerBtn=c.querySelector('#timer-btn'),timerEl=c.querySelector('#timer-elapsed');
    timerBtn.addEventListener('click',async()=>{
      if(!_timerStart){
        _timerStart=Date.now();timerEl.classList.remove('hidden');timerBtn.textContent='⏹ End Meeting';timerBtn.classList.add('running');
        _timerInterval=setInterval(()=>{const s=Math.floor((Date.now()-_timerStart)/1000);const mm=Math.floor(s/60),ss=s%60;timerEl.textContent=mm+':'+(ss<10?'0':'')+ss;},1000);
        const { error } = await supabase.from('meetings').update({ status:'in_progress' }).eq('id', m.id);
        if (!error) { c.querySelector('#meeting-status').value='in_progress'; _currentMeeting.status='in_progress'; }
        else console.warn('Timer start update failed:', error.message);
      }else{
        clearInterval(_timerInterval);_timerInterval=null;_timerStart=null;
        timerEl.classList.add('hidden');timerBtn.textContent='▶ Start Meeting';timerBtn.classList.remove('running');
        const { error } = await supabase.from('meetings').update({ status:'completed' }).eq('id', m.id);
        if (!error) { c.querySelector('#meeting-status').value='completed'; _currentMeeting.status='completed'; }
        else console.warn('Timer end update failed:', error.message);
      }
    });
    c.querySelectorAll('.agenda-toggle').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const content=btn.nextElementSibling;
        const isOpen=content.classList.contains('open');
        btn.classList.toggle('open',!isOpen);
        content.classList.toggle('open',!isOpen);
      });
    });
    wireHeadlines(c);
    wireTodos(c);
    wireConclude(c);
  }

  function agendaSection(num,title,time,content){
    return `<div class="agenda-section"><button class="agenda-toggle"><div class="agenda-num">${num}</div><div class="agenda-title-text">${title}</div><span class="agenda-time">${time}</span><span class="agenda-arrow">&#x25BC;</span></button><div class="agenda-content">${content}</div></div>`;
  }
  function renderSegue(){
    return `<p style="font-size:.88rem;color:#666;font-family:inherit;">Start with 1 minute each: share a piece of good news &#x2014; personal or professional.</p>`;
  }
  function renderHeadlines(){
    const items=_headlines;
    return `<ul class="item-list" id="headlines-list">${items.length?items.map(h=>`<li><span class="item-text">${escHtml(h.description)}</span><span class="item-meta">${h.type==='good_news'?'&#x1F4A1;':'&#x26A0;'}</span><button class="item-del-btn" data-hid="${h.id}">&times;</button></li>`).join(''):'<li style="color:#aaa;font-style:italic;">No headlines yet.</li>'}</ul><div class="item-add-row"><select class="field-select" id="headline-type" style="flex-shrink:0;padding:7px 10px;"><option value="good_news">&#x1F4A1; Good News</option><option value="headline">&#x26A0; Headline</option></select><input type="text" class="item-add-input" id="headline-input" placeholder="Add a headline..."/><button class="ws-btn" id="add-headline-btn" style="padding:8px 14px;">Add</button></div>`;
  }
  function renderTodos(){
    const items=_todos;
    return `<ul class="item-list" id="todos-list">${items.length?items.map(t=>`<li><input type="checkbox" ${t.done?'checked':''} data-tid="${t.id}" style="flex-shrink:0;"/><span class="item-text" style="${t.done?'text-decoration:line-through;color:#aaa':''}">${escHtml(t.description)}</span><span class="item-meta">${t.owner?escHtml(t.owner):''}</span><button class="item-del-btn" data-tid="${t.id}">&times;</button></li>`).join(''):'<li style="color:#aaa;font-style:italic;">No todos yet.</li>'}</ul><div class="item-add-row"><input type="text" class="item-add-input" id="todo-input" placeholder="Add a to-do..."/>${ownerSelectHtml('todo-owner', '', { maxWidth: '140px' })}<button class="ws-btn" id="add-todo-btn" style="padding:8px 14px;">Add</button></div>`;
  }
  function renderConclude(){
    const m = _currentMeeting;
    return `<div style="margin-bottom:16px;"><span class="label-sm">Meeting Rating (1&#x2013;10)</span><div class="rating-btns">${[...Array(10)].map((_,i)=>`<button class="rating-btn ${m.rating===(i+1)?'selected':''}" data-rating="${i+1}">${i+1}</button>`).join('')}</div></div><div><span class="label-sm">Notes / Cascading Messages</span><textarea class="notes-textarea" id="meeting-notes" placeholder="Any action items or messages to cascade to the team...">${escHtml(m.notes||'')}</textarea><button class="ws-btn-secondary" id="save-notes-btn" style="margin-top:8px;">Save Notes</button></div>`;
  }

  function wireHeadlines(c){
    const addBtn = c.querySelector('#add-headline-btn');
    if (addBtn) addBtn.addEventListener('click', async () => {
      const desc=c.querySelector('#headline-input').value.trim();
      const type=c.querySelector('#headline-type').value;
      if(!desc)return;
      const { data, error } = await supabase
        .from('meeting_headlines')
        .insert({ meeting_id: _currentMeeting.id, type, description: desc })
        .select()
        .single();
      if (error || !data) { console.warn('Insert headline failed:', error && error.message); showToast('Failed','error'); return; }
      _headlines.push(data);
      showToast('Added','success');
      renderDetail();
    });
    c.querySelectorAll('.item-del-btn[data-hid]').forEach(btn=>btn.addEventListener('click', async () => {
      const hid = btn.dataset.hid;
      const { error } = await supabase.from('meeting_headlines').delete().eq('id', hid);
      if (error) { console.warn('Delete headline failed:', error.message); showToast('Failed','error'); return; }
      _headlines = _headlines.filter(h => String(h.id) !== String(hid));
      renderDetail();
    }));
  }

  function wireTodos(c){
    const addBtn = c.querySelector('#add-todo-btn');
    if (addBtn) addBtn.addEventListener('click', async () => {
      const desc=c.querySelector('#todo-input').value.trim();
      const owner=c.querySelector('#todo-owner').value.trim();
      if(!desc)return;
      const { data, error } = await supabase
        .from('meeting_todos')
        .insert({ meeting_id: _currentMeeting.id, description: desc, owner: owner||null, done: false })
        .select()
        .single();
      if (error || !data) { console.warn('Insert todo failed:', error && error.message); showToast('Failed','error'); return; }
      _todos.push(data);
      showToast('Added','success');
      renderDetail();
    });
    c.querySelectorAll('input[type=checkbox][data-tid]').forEach(cb=>cb.addEventListener('change', async () => {
      const tid = cb.dataset.tid;
      const todo = _todos.find(t => String(t.id) === String(tid));
      const newDone = cb.checked;
      const { error } = await supabase.from('meeting_todos').update({ done: newDone }).eq('id', tid);
      if (error) { console.warn('Update todo failed:', error.message); cb.checked = !cb.checked; showToast('Failed','error'); return; }
      if (todo) todo.done = newDone;
    }));
    c.querySelectorAll('.item-del-btn[data-tid]').forEach(btn=>btn.addEventListener('click', async () => {
      const tid = btn.dataset.tid;
      const { error } = await supabase.from('meeting_todos').delete().eq('id', tid);
      if (error) { console.warn('Delete todo failed:', error.message); showToast('Failed','error'); return; }
      _todos = _todos.filter(t => String(t.id) !== String(tid));
      renderDetail();
    }));
  }

  function wireConclude(c){
    c.querySelectorAll('.rating-btn').forEach(btn=>btn.addEventListener('click', async () => {
      const rating=parseInt(btn.dataset.rating);
      const { error } = await supabase.from('meetings').update({ rating }).eq('id', _currentMeeting.id);
      if (error) { console.warn('Update rating failed:', error.message); showToast('Failed','error'); return; }
      _currentMeeting.rating = rating;
      c.querySelectorAll('.rating-btn').forEach(b => b.classList.toggle('selected', parseInt(b.dataset.rating) === rating));
      showToast('Rating saved','success');
    }));
    const notesBtn=c.querySelector('#save-notes-btn');
    if (notesBtn) notesBtn.addEventListener('click', async () => {
      const notes=c.querySelector('#meeting-notes').value;
      const { error } = await supabase.from('meetings').update({ notes }).eq('id', _currentMeeting.id);
      if (error) { console.warn('Update notes failed:', error.message); showToast('Failed','error'); return; }
      _currentMeeting.notes = notes;
      showToast('Notes saved','success');
    });
  }

  (async()=>{
    const{data:{user}, error: authError}=await supabase.auth.getUser();
    if(!user||authError){window.location.href='login.html';return}
    const { data: profile } = await supabase
      .from('users').select('membership_status').eq('id', user.id).single();
    if (!profile || profile.membership_status !== 'active') {
      window.location.href = 'inactive.html'; return;
    }
    orgId = window.activeOrg && window.activeOrg.get();
    if (!orgId) { window.location.href = 'index.html'; return; }

    meetingId = getMeetingId();
    if (!meetingId) {
      // No meeting id in URL → redirect to the meeting list per spec.
      window.location.href = 'meeting.html';
      return;
    }

    document.getElementById('signOutBtn').addEventListener('click',async()=>{
      await supabase.auth.signOut(); window.location.href='login.html';
    });

    await loadOwnerOptions();
    try { await loadDetail(meetingId); }
    catch(e){ console.warn('Load error:', e); document.getElementById('meeting-empty').classList.remove('hidden'); }
    document.body.style.opacity='1';
  })();

  // Owner <select> populated from team_members (canonical names → per-user reports).
  // Used in the todo-add row inside renderTodos().
  let OWNER_NAMES = [];
  async function loadOwnerOptions(){
    if (!orgId) return;
    const { data, error } = await supabase
      .from('team_members')
      .select('display_name, invited_email, status')
      .eq('organisation_id', orgId)
      .neq('status', 'removed');
    if (error) { console.warn('loadOwnerOptions:', error.message); return; }
    const names = (data || [])
      .map(m => (m.display_name && m.display_name.trim()) || (m.invited_email && m.invited_email.trim()) || '')
      .filter(Boolean);
    OWNER_NAMES = [...new Set(names)].sort((a,b)=>a.localeCompare(b));
  }
  function ownerSelectHtml(id, currentValue, opts){
    opts = opts || {};
    const style = opts.maxWidth ? `style="max-width:${opts.maxWidth};"` : '';
    let html = `<select class="item-add-input" id="${id}" ${style}>`;
    html += '<option value="">— Owner —</option>';
    OWNER_NAMES.forEach(n => {
      const sel = (n === currentValue) ? ' selected' : '';
      html += `<option value="${escHtml(n)}"${sel}>${escHtml(n)}</option>`;
    });
    if (currentValue && !OWNER_NAMES.includes(currentValue)) {
      html += `<option value="${escHtml(currentValue)}" selected>${escHtml(currentValue)} (not on team)</option>`;
    }
    html += '</select>';
    return html;
  }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Issues | Your Business Coach</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body{opacity:0;transition:opacity .2s ease}
    .container{padding-bottom:100px;}
    .ws-header{padding:20px 16px 0}
    .ws-title{font-size:1.15rem;font-weight:800;color:var(--primary);margin:0 0 4px}
    .ws-sub{font-size:.83rem;color:#666;margin:0 0 20px;line-height:1.45}
    .ws-btn{padding:9px 20px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;transition:background .15s}
    .ws-btn:hover{background:var(--accent-dark)}
    .ws-btn-secondary{padding:9px 18px;background:white;color:var(--primary);border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .15s}
    .ws-btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
    .page-controls{display:flex;justify-content:space-between;align-items:center;margin:0 16px 24px;flex-wrap:wrap;gap:12px}
    .page-controls-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .field-select{border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-family:inherit;font-size:.88rem;color:var(--primary);background:white;cursor:pointer}
    .kanban{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin:0 16px 28px}
    @media(max-width:700px){.kanban{grid-template-columns:1fr}}
    .kanban-col{background:#f0fdfa;border-radius:12px;padding:16px}
    .kanban-col-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
    .kanban-col-title{font-family:inherit;font-weight:700;color:var(--primary);font-size:.93rem}
    .kanban-count{background:white;color:var(--primary);font-family:inherit;font-weight:700;font-size:.78rem;padding:2px 8px;border-radius:20px;border:1px solid var(--border)}
    .issue-card{background:white;border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:10px;padding:14px;margin-bottom:10px;cursor:pointer;transition:box-shadow .15s,border-color .15s}
    .issue-card:hover{box-shadow:0 2px 8px rgba(27,54,100,.1)}
    .issue-desc{font-family:inherit;font-weight:600;color:var(--text);font-size:.88rem;margin-bottom:6px;line-height:1.4}
    .issue-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .issue-owner{font-size:.78rem;color:#888}
    .solved-tag{font-size:.72rem;font-weight:700;padding:2px 7px;border-radius:20px;background:#e0e7ff;color:#3730a3}
    .kanban-empty{text-align:center;padding:24px 10px;color:#bbb;font-family:inherit;font-size:.82rem}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
    .modal-overlay.hidden{display:none}
    .modal{background:white;border-radius:16px;padding:28px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
    .modal-title{font-family:inherit;font-weight:700;color:var(--primary);font-size:1.15rem}
    .modal-close{background:none;border:none;font-size:1.5rem;cursor:pointer;color:#888;line-height:1;padding:0 4px}
    .modal-field{margin-bottom:16px}
    .modal-label{font-family:inherit;font-weight:600;color:var(--primary);font-size:.88rem;margin-bottom:6px;display:block}
    .modal-input,.modal-select,.modal-textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;font-family:inherit;font-size:.93rem;color:var(--text);background:white;box-sizing:border-box}
    .modal-input:focus,.modal-select:focus,.modal-textarea:focus{outline:none;border-color:var(--accent)}
    .modal-textarea{resize:vertical}
    .modal-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .modal-footer{display:flex;justify-content:space-between;align-items:center;margin-top:24px;gap:10px}
    .modal-footer-right{display:flex;gap:10px}
    .toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-family:inherit;font-weight:600;font-size:.88rem;z-index:2000;transition:opacity .3s;box-shadow:0 4px 12px rgba(0,0,0,.15)}
    .toast-hidden{opacity:0;pointer-events:none}
    .toast-success{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
    .toast-error{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
    .hidden{display:none!important}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e5e7eb;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -2px 8px rgba(0,0,0,.06)}
    .bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0 6px;text-decoration:none;color:#aaa;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;gap:3px;transition:color .15s}
    .bottom-nav-item.active,.bottom-nav-item:hover{color:#0D9488;text-decoration:none}
    .bottom-nav-icon{font-size:20px;line-height:1}
  </style>
  <script src="js/active-session.js" defer></script>
  <script src="js/active-org.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-left">
        <a href="operations.html" class="header-back">&#x2190; Operations</a>
        <span class="header-title">Issues</span>
        <span id="activeBizName" class="biz-pill"></span>
      </div>
      <button class="sign-out-btn" id="signOutBtn">Sign Out</button>
    </div>
  </header>

  <div class="container">
    <div class="ws-header">
      <h1 class="ws-title">&#x26A1; Issues</h1>
      <p class="ws-sub">Identify, Discuss, Resolve &#x2014; capture and work through your company&#x2019;s obstacles.</p>
    </div>

    <div class="ws-hint">
      <a href="learning-vault.html">Explore issue-solving guides in the Learning Vault &#x2192;</a>
    </div>

    <div class="page-controls">
      <div class="page-controls-left">
        <span style="font-family:inherit;font-weight:600;color:var(--primary);font-size:.9rem;">Owner:</span>
        <select class="field-select" id="owner-filter"><option value="">All Owners</option></select>
      </div>
      <button class="ws-btn" id="add-issue-btn">+ Add Issue</button>
    </div>

    <div class="kanban">
      <div class="kanban-col">
        <div class="kanban-col-header"><span class="kanban-col-title">&#x1F7E1; Open</span><span class="kanban-count" id="count-open">0</span></div>
        <div id="cards-open"></div>
      </div>
      <div class="kanban-col">
        <div class="kanban-col-header"><span class="kanban-col-title">&#x2705; Resolved</span><span class="kanban-count" id="count-resolved">0</span></div>
        <div id="cards-resolved"></div>
      </div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="issue-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="issue-modal-title">Add Issue</span>
        <button class="modal-close" id="issue-modal-close">&times;</button>
      </div>
      <input type="hidden" id="issue-id"/>
      <div class="modal-field">
        <label class="modal-label">Issue Description *</label>
        <textarea class="modal-textarea" id="issue-description" rows="3" placeholder="What is the issue?"></textarea>
      </div>
      <div class="modal-field">
        <label class="modal-label">Owner</label>
        <input type="text" class="modal-input" id="issue-owner" placeholder="Who raised this?"/>
      </div>
      <div class="modal-field">
        <label class="modal-label">Status</label>
        <select class="modal-select" id="issue-status">
          <option value="open">Open</option>
          <option value="resolved">Resolved</option>
        </select>
      </div>
      <div class="modal-field" id="solution-field">
        <label class="modal-label">Solution *</label>
        <textarea class="modal-textarea" id="issue-solution" rows="2" placeholder="How was this resolved?"></textarea>
      </div>
      <div class="modal-footer">
        <button class="ws-btn-secondary hidden" id="issue-modal-delete" style="color:#991b1b;border-color:#fca5a5;">Delete</button>
        <div class="modal-footer-right">
          <button class="ws-btn-secondary" id="issue-modal-cancel">Cancel</button>
          <button class="ws-btn" id="issue-modal-save">Save Issue</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast toast-hidden" id="toast"></div>

  <nav class="bottom-nav">
    <a class="bottom-nav-item" href="business.html"><span class="bottom-nav-icon">&#x1F3E0;</span><span>Home</span></a>
    <a class="bottom-nav-item" href="planning.html"><span class="bottom-nav-icon">&#x1F5FA;&#xFE0F;</span><span>Planning</span></a>
    <a class="bottom-nav-item" href="strategy.html"><span class="bottom-nav-icon">&#x1F9ED;</span><span>Strategy</span></a>
    <a class="bottom-nav-item active" href="operations.html"><span class="bottom-nav-icon">&#x2699;&#xFE0F;</span><span>Operations</span></a>
    <a class="bottom-nav-item" href="learning-vault.html"><span class="bottom-nav-icon">&#x1F4DA;</span><span>Learn</span></a>
  </nav>

  <script type="module">
  'use strict';
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
  const supabase = createClient(
    'https://eekefsuaefgpqmjdyniy.supabase.co',
    'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y'
  );

  /* Previous localStorage SEED (kept here as a reference for sample data only —
     no longer auto-applied. New businesses start with empty inputs.)
     SEED = [
       { description: 'Onboarding flow takes new clients 3+ weeks...', owner: 'Cath',   status: 'open',     solution: '' },
       { description: 'Coach utilisation below 70% target...',         owner: 'Lou',    status: 'open',     solution: '' },
       { description: 'No standard scorecard for coach performance...', owner: 'Andrew', status: 'open',    solution: '' },
       { description: 'Website conversion rate dropped 30%...',        owner: 'Andrew', status: 'resolved', solution: '...' }
     ]
  */

  let orgId = null;
  let _issues = [];

  function escHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
  function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast toast-'+type;t.classList.remove('toast-hidden');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.add('toast-hidden'),3000)}

  async function loadIssues(){
    const ownerFilter = document.getElementById('owner-filter').value;
    let query = supabase
      .from('issues')
      .select('*')
      .eq('organisation_id', orgId)
      .order('created_at', { ascending: false });
    const { data, error } = await query;
    if (error) {
      console.warn('Load issues failed:', error.message);
      _issues = [];
    } else {
      _issues = Array.isArray(data) ? data : [];
    }
    const filtered = ownerFilter ? _issues.filter(i => i.owner === ownerFilter) : _issues;
    renderBoard(filtered);
  }

  function renderBoard(issues){
    const open=issues.filter(i=>i.status!=='resolved');
    const resolved=issues.filter(i=>i.status==='resolved');
    document.getElementById('count-open').textContent=open.length;
    document.getElementById('count-resolved').textContent=resolved.length;
    renderCards('cards-open',open);
    renderCards('cards-resolved',resolved);
    populateOwnerFilter(_issues);
  }
  function populateOwnerFilter(issues){
    const owners=[...new Set(issues.map(i=>i.owner).filter(Boolean))];
    const sel=document.getElementById('owner-filter');
    const cur=sel.value;
    sel.innerHTML='<option value="">All Owners</option>'+owners.map(o=>`<option value="${escHtml(o)}" ${o===cur?'selected':''}>${escHtml(o)}</option>`).join('');
  }
  function renderCards(containerId,issues){
    const c=document.getElementById(containerId);
    if(!issues.length){c.innerHTML='<div class="kanban-empty">None</div>';return;}
    c.innerHTML=issues.map(i=>`<div class="issue-card" data-id="${i.id}"><div class="issue-desc">${escHtml(i.description)}</div>${i.owner?`<div class="issue-meta"><span class="issue-owner">${escHtml(i.owner)}</span></div>`:''}</div>`).join('');
    c.querySelectorAll('.issue-card').forEach(card=>card.addEventListener('click',()=>openModal(_issues.find(x=>String(x.id)===card.dataset.id))));
  }

  document.getElementById('owner-filter').addEventListener('change',()=>{
    const filtered = document.getElementById('owner-filter').value
      ? _issues.filter(i => i.owner === document.getElementById('owner-filter').value)
      : _issues;
    renderBoard(filtered);
  });
  document.getElementById('add-issue-btn').addEventListener('click',()=>openModal(null));
  const statusSel=document.getElementById('issue-status');
  const solutionField=document.getElementById('solution-field');
  statusSel.addEventListener('change',()=>solutionField.style.display=statusSel.value==='resolved'?'':'none');

  function openModal(issue){
    const isNew=!issue;
    document.getElementById('issue-modal-title').textContent=isNew?'Add Issue':'Edit Issue';
    document.getElementById('issue-id').value=isNew?'':issue.id;
    document.getElementById('issue-description').value=isNew?'':(issue.description||'');
    document.getElementById('issue-owner').value=isNew?'':(issue.owner||'');
    statusSel.value=isNew?'open':(issue.status||'open');
    document.getElementById('issue-solution').value=isNew?'':(issue.solution||'');
    solutionField.style.display=statusSel.value==='resolved'?'':'none';
    document.getElementById('issue-modal-delete').classList.toggle('hidden',isNew);
    document.getElementById('issue-modal').classList.remove('hidden');
  }
  function closeModal(){document.getElementById('issue-modal').classList.add('hidden')}
  document.getElementById('issue-modal-close').addEventListener('click',closeModal);
  document.getElementById('issue-modal-cancel').addEventListener('click',closeModal);
  document.getElementById('issue-modal').addEventListener('click',e=>{if(e.target===document.getElementById('issue-modal'))closeModal()});

  document.getElementById('issue-modal-save').addEventListener('click',async()=>{
    const id=document.getElementById('issue-id').value;
    const description=document.getElementById('issue-description').value.trim();
    const owner=document.getElementById('issue-owner').value.trim();
    const status=statusSel.value;
    const solution=document.getElementById('issue-solution').value.trim();
    if(!description){showToast('Description is required','error');return}
    if(status==='resolved'&&!solution){showToast('A solution is required to resolve an issue','error');return}
    try{
      if(id){
        const { error } = await supabase
          .from('issues')
          .update({ description, owner: owner||null, status, solution: solution||null })
          .eq('id', id);
        if (error) { console.warn('Update issue failed:', error.message); showToast('Save failed: '+error.message,'error'); return; }
        showToast('Issue updated','success');
      } else {
        const { error } = await supabase
          .from('issues')
          .insert({ organisation_id: orgId, description, owner: owner||null, status, solution: solution||null });
        if (error) { console.warn('Insert issue failed:', error.message); showToast('Save failed: '+error.message,'error'); return; }
        showToast('Issue created','success');
      }
      closeModal();
      await loadIssues();
    }catch(e){showToast('Save failed: '+e.message,'error')}
  });

  document.getElementById('issue-modal-delete').addEventListener('click',async()=>{
    const id=document.getElementById('issue-id').value;
    if(!id||!confirm('Delete this issue?'))return;
    const { error } = await supabase.from('issues').delete().eq('id', id);
    if (error) { console.warn('Delete issue failed:', error.message); showToast('Delete failed','error'); return; }
    showToast('Deleted','success');
    closeModal();
    await loadIssues();
  });

  (async()=>{
    const{data:{user}, error: authError}=await supabase.auth.getUser();
    if(!user||authError){window.location.href='login.html';return}
    const { data: profile } = await supabase
      .from('users').select('membership_status').eq('id', user.id).single();
    if (!profile || profile.membership_status !== 'active') {
      window.location.href = 'inactive.html'; return;
    }
    orgId = window.activeOrg && window.activeOrg.get();
    if (!orgId) { window.location.href = 'index.html'; return; }

    document.getElementById('signOutBtn').addEventListener('click',async()=>{
      await supabase.auth.signOut(); window.location.href='login.html';
    });

    try { await loadIssues(); }
    catch(e){ console.warn('Load error:', e); }
    document.body.style.opacity='1';
  })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coach4U — Forgot Password</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="theme-color" content="#1B3664" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
      background: #f4f6fa;
      color: #2D2D2D;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .box {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(27,54,100,0.10);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
    }
    .logo { font-size: 26px; font-weight: 700; color: #1B3664; text-align: center; margin-bottom: 24px; }
    h1 { font-size: 20px; font-weight: 700; color: #1B3664; margin-bottom: 8px; text-align: center; }
    p  { font-size: 14px; color: #6C757D; text-align: center; margin-bottom: 24px; line-height: 1.5; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #6C757D; margin-bottom: 6px; }
    input[type="email"] { width: 100%; padding: 11px 14px; font-size: 15px; border: 1.5px solid #DDDDDD; border-radius: 8px; font-family: inherit; color: #2D2D2D; transition: border-color 0.15s; }
    input:focus { outline: none; border-color: #5684C4; box-shadow: 0 0 0 3px rgba(86,132,196,0.15); }
    .btn { width: 100%; padding: 12px 14px; font-size: 15px; font-weight: 600; background: #1B3664; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; transition: background 0.15s; }
    .btn:hover    { background: #0D1F3C; }
    .btn:disabled { background: #a0aab4; cursor: not-allowed; }
    .back-link { display: block; text-align: center; margin-top: 14px; font-size: 13px; color: #5684C4; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
    .alert { border-radius: 8px; padding: 12px 14px; font-size: 14px; margin-top: 14px; display: none; }
    .alert-error   { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="box">
      <div class="logo">Coach4U</div>
      <h1>Reset your password</h1>
      <p>Enter your email and we'll send you a reset link.</p>

      <form id="forgot-form">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" required placeholder="you@example.com" />
        </div>
        <button type="submit" class="btn" id="submit-btn">Send Reset Link</button>
      </form>

      <div id="msg" class="alert"></div>
      <a href="index.html" class="back-link">&#x2190; Back to sign in</a>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient(
      'https://eekefsuaefgpqmjdyniy.supabase.co',
      'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y'
    );

    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email  = document.getElementById('email').value.trim();
      const msgEl  = document.getElementById('msg');
      const btn    = document.getElementById('submit-btn');

      btn.disabled    = true;
      btn.textContent = 'Sending…';

      // Build redirect URL using current page location (works on any domain/path)
      const redirectTo = window.location.href.replace('forgot-password.html', 'reset-password.html');

      const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo });

      msgEl.style.display = 'block';
      if (error) {
        msgEl.className     = 'alert alert-error';
        msgEl.textContent   = error.message;
        btn.disabled        = false;
        btn.textContent     = 'Send Reset Link';
      } else {
        msgEl.className   = 'alert alert-success';
        msgEl.textContent = 'Check your email for a reset link.';
        btn.textContent   = 'Sent!';
      }
    });
  </script>
</body>
</html>

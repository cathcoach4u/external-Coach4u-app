<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Goals | Your Business Coach</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body{opacity:0;transition:opacity .2s ease}
    .container{padding-bottom:100px;}
    .ws-header{padding:20px 16px 0}
    .ws-title{font-size:1.15rem;font-weight:800;color:var(--primary);margin:0 0 4px}
    .ws-sub{font-size:.83rem;color:#666;margin:0 0 20px;line-height:1.45}
    .ws-btn{padding:9px 20px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;transition:background .15s}
    .ws-btn:hover{background:var(--accent-dark)}
    .ws-btn-secondary{padding:9px 18px;background:white;color:var(--primary);border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .15s}
    .ws-btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
    .page-controls{display:flex;justify-content:space-between;align-items:center;margin:0 16px 24px;flex-wrap:wrap;gap:12px}
    .field-select{border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-family:inherit;font-size:.88rem;color:var(--primary);background:white;cursor:pointer}
    .progress-card{background:#f0fdfa;border-radius:12px;padding:16px 20px;margin:0 16px 28px}
    .progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .progress-label{font-family:inherit;font-weight:600;color:var(--primary);font-size:.9rem}
    .progress-pct{font-family:inherit;font-weight:700;color:var(--accent)}
    .progress-track{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
    .progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .4s ease}
    .goals-group{margin:0 16px 28px}
    .goals-group-header{font-family:inherit;font-weight:700;color:var(--primary);font-size:.95rem;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:8px}
    .goals-group-count{background:#f0fdfa;color:var(--accent);font-size:.78rem;font-weight:700;padding:2px 8px;border-radius:20px}
    .goal-card{display:flex;align-items:flex-start;gap:14px;padding:16px 20px;background:white;border:1px solid var(--border);border-radius:10px;margin-bottom:10px;cursor:pointer;transition:box-shadow .15s,border-color .15s}
    .goal-card:hover{box-shadow:0 2px 8px rgba(27,54,100,.1);border-color:var(--accent)}
    .goal-icon{font-size:1.1rem;flex-shrink:0;margin-top:2px}
    .goal-desc{font-family:inherit;font-weight:600;color:var(--text);font-size:.95rem;margin-bottom:4px}
    .goal-meta{font-size:.82rem;color:#888;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .status-badge{font-size:.75rem;font-weight:700;padding:2px 8px;border-radius:20px}
    .sb-on_track{background:#d1fae5;color:#065f46}
    .sb-off_track{background:#fee2e2;color:#991b1b}
    .sb-at_risk{background:#fef3c7;color:#92400e}
    .sb-done{background:#e0e7ff;color:#3730a3}
    .company-tag{background:#eff6ff;color:#1d4ed8;font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
    .modal-overlay.hidden{display:none}
    .modal{background:white;border-radius:16px;padding:28px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
    .modal-title{font-family:inherit;font-weight:700;color:var(--primary);font-size:1.15rem}
    .modal-close{background:none;border:none;font-size:1.5rem;cursor:pointer;color:#888;line-height:1;padding:0 4px}
    .modal-field{margin-bottom:16px}
    .modal-label{font-family:inherit;font-weight:600;color:var(--primary);font-size:.88rem;margin-bottom:6px;display:block}
    .modal-input,.modal-select,.modal-textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;font-family:inherit;font-size:.93rem;color:var(--text);background:white;box-sizing:border-box}
    .modal-input:focus,.modal-select:focus,.modal-textarea:focus{outline:none;border-color:var(--accent)}
    .modal-textarea{resize:vertical}
    .modal-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .modal-footer{display:flex;justify-content:space-between;align-items:center;margin-top:24px;gap:10px}
    .modal-footer-right{display:flex;gap:10px}
    .toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-family:inherit;font-weight:600;font-size:.88rem;z-index:2000;transition:opacity .3s;box-shadow:0 4px 12px rgba(0,0,0,.15)}
    .toast-hidden{opacity:0;pointer-events:none}
    .toast-success{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
    .toast-error{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
    .empty-state{text-align:center;padding:48px 20px;color:#888}
    .empty-state-icon{font-size:2.5rem;margin-bottom:12px;opacity:.4}
    .empty-state p{font-family:inherit;font-size:.95rem}
    .hidden{display:none!important}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e5e7eb;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -2px 8px rgba(0,0,0,.06)}
    .bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0 6px;text-decoration:none;color:#aaa;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;gap:3px;transition:color .15s}
    .bottom-nav-item.active,.bottom-nav-item:hover{color:#0D9488;text-decoration:none}
    .bottom-nav-icon{font-size:20px;line-height:1}
  </style>
  <script src="js/active-session.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-left">
        <a href="operations.html" class="header-back">&#x2190; Operations</a>
        <span class="header-title">Quarterly Goals</span>
      </div>
      <button class="sign-out-btn" id="signOutBtn">Sign Out</button>
    </div>
  </header>

  <div class="container">
    <div class="ws-header">
      <h1 class="ws-title">&#x1F3AF; Quarterly Goals</h1>
      <p class="ws-sub">Your most important priorities for the quarter &#x2014; the focus areas that move your business forward.</p>
    </div>

    <div class="ws-hint">
      <a href="learning-vault.html">Explore quarterly planning guides in the Learning Vault &#x2192;</a>
    </div>

    <div class="page-controls">
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-family:inherit;font-weight:600;color:var(--primary);font-size:.9rem;">Quarter:</span>
        <select class="field-select" id="quarter-select">
          <option value="Q1 2026">Q1 2026</option>
          <option value="Q2 2026" selected>Q2 2026</option>
          <option value="Q3 2026">Q3 2026</option>
          <option value="Q4 2026">Q4 2026</option>
          <option value="Q1 2027">Q1 2027</option>
        </select>
      </div>
      <button class="ws-btn" id="add-goal-btn">+ Add Goal</button>
    </div>

    <div class="progress-card">
      <div class="progress-row">
        <span class="progress-label" id="goals-progress-text">0 of 0 goals complete</span>
        <span class="progress-pct" id="goals-progress-pct">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="goals-progress-fill" style="width:0%"></div></div>
    </div>

    <div id="goals-board"></div>
  </div>

  <div class="modal-overlay hidden" id="goal-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="goal-modal-title">Add Goal</span>
        <button class="modal-close" id="goal-modal-close">&times;</button>
      </div>
      <input type="hidden" id="goal-id"/>
      <div class="modal-field">
        <label class="modal-label">Goal Description *</label>
        <textarea class="modal-textarea" id="goal-description" rows="3" placeholder="What must happen this quarter?"></textarea>
      </div>
      <div class="modal-field">
        <label class="modal-label">Owner</label>
        <input type="text" class="modal-input" id="goal-owner" placeholder="Person responsible"/>
      </div>
      <div class="modal-2col modal-field">
        <div>
          <label class="modal-label">Status</label>
          <select class="modal-select" id="goal-status">
            <option value="on_track">On Track</option>
            <option value="at_risk">At Risk</option>
            <option value="off_track">Off Track</option>
            <option value="done">Done</option>
          </select>
        </div>
        <div>
          <label class="modal-label">Quarter</label>
          <select class="modal-select" id="goal-quarter">
            <option value="Q1 2026">Q1 2026</option>
            <option value="Q2 2026">Q2 2026</option>
            <option value="Q3 2026">Q3 2026</option>
            <option value="Q4 2026">Q4 2026</option>
            <option value="Q1 2027">Q1 2027</option>
          </select>
        </div>
      </div>
      <div class="modal-field">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" id="goal-company" style="width:16px;height:16px;"/>
          <span class="modal-label" style="margin:0;">Mark as Company Goal</span>
        </label>
      </div>
      <div class="modal-footer">
        <button class="ws-btn-secondary hidden" id="goal-modal-delete" style="color:#991b1b;border-color:#fca5a5;">Delete</button>
        <div class="modal-footer-right">
          <button class="ws-btn-secondary" id="goal-modal-cancel">Cancel</button>
          <button class="ws-btn" id="goal-modal-save">Save Goal</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast toast-hidden" id="toast"></div>

  <nav class="bottom-nav">
    <a class="bottom-nav-item" href="index.html"><span class="bottom-nav-icon">&#x1F3E0;</span><span>Home</span></a>
    <a class="bottom-nav-item" href="planning.html"><span class="bottom-nav-icon">&#x1F5FA;&#xFE0F;</span><span>Planning</span></a>
    <a class="bottom-nav-item" href="strategy.html"><span class="bottom-nav-icon">&#x1F9ED;</span><span>Strategy</span></a>
    <a class="bottom-nav-item active" href="operations.html"><span class="bottom-nav-icon">&#x2699;&#xFE0F;</span><span>Operations</span></a>
    <a class="bottom-nav-item" href="learning-vault.html"><span class="bottom-nav-icon">&#x1F4DA;</span><span>Learn</span></a>
  </nav>

  <script type="module">
  'use strict';
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
  const _sb=createClient('https://eekefsuaefgpqmjdyniy.supabase.co','sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y');
  document.getElementById('signOutBtn').addEventListener('click',async()=>{await _sb.auth.signOut();window.location.href='login.html';});
  let currentBusinessId=1,_goals=[];
  function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
  function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast toast-'+type;t.classList.remove('toast-hidden');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.add('toast-hidden'),3000)}
  // localStorage demo data stub (replaces non-existent /api/... backend). See CLAUDE.md v0.5.50.
  const _LS_KEY='coach4u_demo_rocks';
  function _genId(){return Date.now()*1000+Math.floor(Math.random()*1000)}
  function _goalsSeed(){
    // Match the quarter dropdown's default selected option so seeded goals are visible on first visit.
    const q='Q2 2026';
    return[
      {id:2001,description:'Launch new "Strategy in a Day" workshop',owner:'Cath',status:'on_track',quarter:q,company_rock:1,business_id:1,sort_order:1,seat_id:null},
      {id:2002,description:'Hire 1 senior coach',owner:'Lou',status:'at_risk',quarter:q,company_rock:1,business_id:1,sort_order:2,seat_id:null},
      {id:2003,description:'Move CRM to HubSpot',owner:'Andrew',status:'on_track',quarter:q,company_rock:0,business_id:1,sort_order:3,seat_id:null},
      {id:2004,description:'Run 3 prospect events in Manchester',owner:'Cath',status:'off_track',quarter:q,company_rock:0,business_id:1,sort_order:4,seat_id:null}
    ];
  }
  function _goalsLoad(){let d;try{d=JSON.parse(localStorage.getItem(_LS_KEY))}catch(_){d=null}if(!d||!Array.isArray(d)){d=_goalsSeed();_goalsSave(d)}return d}
  function _goalsSave(d){localStorage.setItem(_LS_KEY,JSON.stringify(d))}
  async function api(method,path,body){
    await new Promise(r=>setTimeout(r,30));
    const [pathname,query='']=path.split('?');
    const qp={};query.split('&').filter(Boolean).forEach(p=>{const[k,v]=p.split('=');qp[k]=decodeURIComponent(v||'')});
    if(method==='GET'&&pathname==='/businesses')return[{id:1,name:'Demo Business',type:'holding'}];
    const d=_goalsLoad();
    if(method==='GET'&&pathname==='/rocks'){
      const q=qp.quarter;
      return d.filter(r=>!q||r.quarter===q).slice().sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
    }
    if(method==='POST'&&pathname==='/rocks'){
      const g={id:_genId(),description:body.description,owner:body.owner||'',status:body.status||'on_track',quarter:body.quarter,company_rock:body.company_rock?1:0,seat_id:body.seat_id||null,business_id:body.business_id||1,sort_order:d.length+1};
      d.push(g);_goalsSave(d);return g;
    }
    if(method==='PUT'&&pathname.startsWith('/rocks/')){
      const id=parseInt(pathname.split('/').pop());const g=d.find(x=>x.id===id);
      if(g){g.description=body.description;g.owner=body.owner||'';g.status=body.status;g.quarter=body.quarter;g.company_rock=body.company_rock?1:0;g.seat_id=body.seat_id||null;_goalsSave(d)}
      return g||{};
    }
    if(method==='DELETE'&&pathname.startsWith('/rocks/')){
      const id=parseInt(pathname.split('/').pop());
      const idx=d.findIndex(x=>x.id===id);if(idx>-1){d.splice(idx,1);_goalsSave(d)}return{ok:true};
    }
    throw new Error('Unhandled api path: '+method+' '+pathname);
  }
  const get=p=>api('GET',p),post=(p,b)=>api('POST',p,b),put=(p,b)=>api('PUT',p,b),del=p=>api('DELETE',p);
  const STATUS_ICON={on_track:'&#x1F7E2;',at_risk:'&#x1F7E1;',off_track:'&#x1F534;',done:'&#x2705;'};
  const STATUS_LABEL={on_track:'On Track',at_risk:'At Risk',off_track:'Off Track',done:'Done'};
  async function loadGoals(){
    const quarter=document.getElementById('quarter-select').value;
    try{_goals=await get('/rocks?quarter='+encodeURIComponent(quarter)+'&business_id='+currentBusinessId);renderBoard(_goals)}
    catch(e){showToast('Could not load goals','error')}
  }
  function renderBoard(goals){
    const board=document.getElementById('goals-board');
    board.innerHTML='';
    if(!goals.length){board.innerHTML='<div class="empty-state"><div class="empty-state-icon">&#x1F3AF;</div><p>No goals for this quarter yet.<br>Add your first priority to get started.</p></div>';updateProgress([]);return;}
    updateProgress(goals);
    const company=goals.filter(g=>g.company_rock);
    if(company.length)board.appendChild(renderGroup('&#x25C9; Company Goals',company));
    const individual=goals.filter(g=>!g.company_rock);
    [...new Set(individual.map(g=>g.owner||'Unassigned'))].forEach(owner=>board.appendChild(renderGroup(owner,individual.filter(g=>(g.owner||'Unassigned')===owner))));
  }
  function renderGroup(label,goals){
    const group=document.createElement('div');group.className='goals-group';
    group.innerHTML=`<div class="goals-group-header">${label}<span class="goals-group-count">${goals.length}</span></div>`;
    goals.forEach(g=>{
      const card=document.createElement('div');card.className='goal-card';
      card.innerHTML=`<div class="goal-icon">${STATUS_ICON[g.status]||'&#x26AA;'}</div><div style="flex:1"><div class="goal-desc">${escHtml(g.description)}</div><div class="goal-meta">${g.owner?escHtml(g.owner):'<em>Unassigned</em>'}<span class="status-badge sb-${g.status}">${STATUS_LABEL[g.status]||g.status}</span>${g.company_rock?'<span class="company-tag">Company</span>':''}</div></div>`;
      card.addEventListener('click',()=>openModal(_goals.find(x=>x.id===g.id)));group.appendChild(card);
    });
    return group;
  }
  function updateProgress(goals){
    const done=goals.filter(g=>g.status==='done').length,total=goals.length,pct=total?Math.round(done/total*100):0;
    document.getElementById('goals-progress-text').textContent=`${done} of ${total} goals complete`;
    document.getElementById('goals-progress-pct').textContent=pct+'%';
    document.getElementById('goals-progress-fill').style.width=pct+'%';
  }
  document.getElementById('quarter-select').addEventListener('change',loadGoals);
  document.getElementById('add-goal-btn').addEventListener('click',()=>openModal(null));
  function openModal(goal){
    const isNew=!goal;
    document.getElementById('goal-modal-title').textContent=isNew?'Add Goal':'Edit Goal';
    document.getElementById('goal-id').value=isNew?'':goal.id;
    document.getElementById('goal-description').value=isNew?'':(goal.description||'');
    document.getElementById('goal-owner').value=isNew?'':(goal.owner||'');
    document.getElementById('goal-status').value=isNew?'on_track':(goal.status||'on_track');
    document.getElementById('goal-company').checked=isNew?false:!!goal.company_rock;
    const q=document.getElementById('quarter-select').value;
    document.getElementById('goal-quarter').value=isNew?q:(goal.quarter||q);
    document.getElementById('goal-modal-delete').classList.toggle('hidden',isNew);
    document.getElementById('goal-modal').classList.remove('hidden');
  }
  function closeModal(){document.getElementById('goal-modal').classList.add('hidden')}
  document.getElementById('goal-modal-close').addEventListener('click',closeModal);
  document.getElementById('goal-modal-cancel').addEventListener('click',closeModal);
  document.getElementById('goal-modal').addEventListener('click',e=>{if(e.target===document.getElementById('goal-modal'))closeModal()});
  document.getElementById('goal-modal-save').addEventListener('click',async()=>{
    const id=document.getElementById('goal-id').value;
    const description=document.getElementById('goal-description').value.trim();
    const owner=document.getElementById('goal-owner').value.trim();
    const status=document.getElementById('goal-status').value;
    const quarter=document.getElementById('goal-quarter').value;
    const company_rock=document.getElementById('goal-company').checked?1:0;
    if(!description){showToast('Description is required','error');return}
    try{
      if(id){await put(`/rocks/${id}`,{description,owner,status,quarter,company_rock,seat_id:null});showToast('Goal updated','success')}
      else{await post('/rocks',{description,owner,status,quarter,company_rock,seat_id:null,business_id:currentBusinessId});showToast('Goal created','success')}
      closeModal();await loadGoals();
    }catch(e){showToast('Save failed: '+e.message,'error')}
  });
  document.getElementById('goal-modal-delete').addEventListener('click',async()=>{
    const id=document.getElementById('goal-id').value;
    if(!id||!confirm('Delete this goal?'))return;
    try{await del('/rocks/'+id);showToast('Deleted','success');closeModal();await loadGoals()}
    catch(e){showToast('Delete failed','error')}
  });
  (async()=>{
    const{data:{user}}=await _sb.auth.getUser();
    if(!user){window.location.href='login.html';return}
    const { data: profile } = await _sb
      .from('users').select('membership_status').eq('id', user.id).single();
    if (!profile || profile.membership_status !== 'active') {
      window.location.href = 'inactive.html'; return;
    }
    try{
      const businesses=await get('/businesses');
      const biz=businesses.find(b=>b.type==='holding')||businesses[0];
      if(biz)currentBusinessId=biz.id;
      await loadGoals();
    }catch(e){console.error(e)}
    document.body.style.opacity='1';
  })();
  </script>
</body>
</html>

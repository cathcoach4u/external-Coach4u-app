<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teams Coach4U</title>
  <link rel="manifest" href="/external-Coach4u-app/manifest.json">
  <meta name="theme-color" content="#003366">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Coach4U">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="apple-touch-icon" href="../images/logo.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <img src="../images/logo.svg" alt="Coach4U" style="height:36px;vertical-align:middle;">
        <span class="brand-name">Teams Coach4U</span>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="empty-state">
      <div class="empty-state-icon">🚀</div>
      <div class="empty-state-text">Teams Coach4U Coming Soon</div>
      <p style="color: var(--text-muted); margin-bottom: 20px;">This module is being built. Check back soon!</p>
      <a href="/" style="color: var(--accent); text-decoration: none; font-weight: 600;">← Back to Dashboard</a>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    window.requireAuth()

    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/external-Coach4u-app/sw.js')
        .then(reg => console.log('Service Worker registered'))
        .catch(err => console.log('Service Worker registration failed:', err));
    }
  </script>
</body>
</html>

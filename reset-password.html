<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Business Coach — Set New Password</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-page {
      background: linear-gradient(135deg, #003366 0%, #0D9488 100%);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .login-card {
      background: white; border-radius: 12px; padding: 32px 24px;
      max-width: 380px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .login-logo { text-align: center; margin-bottom: 20px; }
    .login-logo h1 { font-size: 24px; font-weight: 700; color: #003366; letter-spacing: -0.5px; }
    .login-title { font-size: 18px; font-weight: 700; color: #003366; margin-bottom: 6px; text-align: center; }
    .login-subtitle { font-size: 13px; color: #888; margin-bottom: 24px; line-height: 1.5; text-align: center; }
    .login-btn {
      width: 100%; padding: 12px 20px; background: #003366; color: white;
      border: none; border-radius: 6px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.2s; margin-top: 4px; font-family: inherit;
    }
    .login-btn:hover { background: #002244; }
    .login-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .login-message { margin-top: 12px; padding: 10px 14px; border-radius: 6px; font-size: 13px; display: none; }
    .login-message.success { background: #D4EDDA; color: #155724; }
    .login-message.error   { background: #F8D7DA; color: #721C24; }
    .password-wrapper { position: relative; }
    .toggle-password {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: #888; font-size: 13px; padding: 4px;
    }
    .toggle-password:hover { color: #0D9488; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
    .form-group input[type="password"] {
      width: 100%; padding: 10px 12px; border: 1px solid #ddd;
      border-radius: 6px; font-size: 16px; font-family: inherit;
      color: #333; background: #fff; transition: border-color 0.2s;
    }
    .form-group input:focus { outline: none; border-color: #0D9488; }
  </style>
  <script src="js/mobile-keyboard.js" defer></script>
</head>
<body class="login-page">

  <div style="display:flex;flex-direction:column;align-items:center;width:100%;max-width:420px;padding:20px;">

    <div class="login-card">
      <div class="login-logo">
        <h1>Your Business Coach</h1>
      </div>
      <p class="login-title">Set a new password</p>
      <p class="login-subtitle">Choose a password that's at least 8 characters.</p>

      <form id="resetForm">
        <div class="form-group">
          <label for="password">New password</label>
          <div class="password-wrapper">
            <input type="password" id="password" required minlength="8" autocomplete="new-password">
            <button type="button" class="toggle-password" id="toggleBtn">Show</button>
          </div>
        </div>

        <div id="message" class="login-message"></div>

        <button type="submit" class="login-btn" id="submitBtn">Update Password</button>
      </form>
    </div>

    <p style="margin-top:20px;font-size:9pt;color:rgba(255,255,255,0.75);text-align:center;line-height:1.6;">
      Strengths-Based Coaching and Counselling<br>
      <a href="http://www.coach4u.com.au" style="color:rgba(255,255,255,0.75);">www.coach4u.com.au</a> |
      <a href="mailto:cath@coach4u.com.au" style="color:rgba(255,255,255,0.75);">cath@coach4u.com.au</a> |
      0402 313 337
    </p>

  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const SUPABASE_URL      = 'https://eekefsuaefgpqmjdyniy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form    = document.getElementById('resetForm');
    const msgEl   = document.getElementById('message');
    const btn     = document.getElementById('submitBtn');
    const toggle  = document.getElementById('toggleBtn');
    const pwInput = document.getElementById('password');

    toggle.addEventListener('click', () => {
      if (pwInput.type === 'password') {
        pwInput.type = 'text';
        toggle.textContent = 'Hide';
      } else {
        pwInput.type = 'password';
        toggle.textContent = 'Show';
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Updating…';
      msgEl.style.display = 'none';
      msgEl.className = 'login-message';

      const { error } = await supabase.auth.updateUser({ password: pwInput.value });

      msgEl.style.display = 'block';
      if (error) {
        msgEl.classList.add('error');
        msgEl.textContent = error.message;
        btn.disabled = false;
        btn.textContent = 'Update Password';
      } else {
        msgEl.classList.add('success');
        msgEl.textContent = 'Password updated. Taking you to sign in…';
        setTimeout(() => window.location.href = 'login.html', 2000);
      }
    });
  </script>

</body>
</html>
